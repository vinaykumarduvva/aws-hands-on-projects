<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Component Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0073BB"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feFlood flood-color="#10B981" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#10B981" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#F58536" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -20; } }
    .flow-line { stroke-dasharray: 6 6; animation: dash 1.5s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes pulse-green {
      0% { filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.4)); }
      50% { filter: drop-shadow(0 0 16px rgba(16, 185, 129, 0.8)); }
      100% { filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.4)); }
    }
    .pulse-obj .card { animation: pulse-green 3s infinite; }

    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="600" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 10 — Auto Scaling Group + ALB Architecture</text>
  <text x="600" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">Fault-Tolerant, Self-Healing, Elastic Web Infrastructure in Default VPC</text>

  <!-- AWS Cloud Boundary -->
  <rect x="50" y="200" width="1100" height="600" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="70" y="185" width="220" height="30" fill="#F8FAFC"/>
  <text x="80" y="207" font-size="20" font-weight="700" fill="#F58536">AWS Cloud (ap-south-1)</text>

  <!-- Internet Users -->
  <g class="node">
    <rect class="card" x="480" y="100" width="240" height="60" rx="30" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="600" y="135" font-size="18" font-weight="700" fill="#374151" text-anchor="middle">🌐 Internet / Users</text>
  </g>

  <path d="M 600 160 L 600 240" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>

  <!-- Application Load Balancer -->
  <g class="node floating">
    <rect class="card" x="250" y="240" width="700" height="100" rx="12" fill="#FFFFFF" stroke="#0073BB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="250" y="240" width="700" height="30" rx="12" fill="url(#blueGrad)"/>
    <rect x="250" y="255" width="700" height="15" fill="url(#blueGrad)"/>
    <text x="600" y="260" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Application Load Balancer</text>
    
    <text x="400" y="300" font-size="13" class="title" text-anchor="middle">my-alb (internet-facing)</text>
    <text x="400" y="320" font-size="11" class="label" text-anchor="middle">Listener: HTTP:80</text>
    
    <text x="800" y="300" font-size="13" class="title" text-anchor="middle">Spans Multi-AZ</text>
    <text x="800" y="320" font-size="11" class="label" text-anchor="middle">SG: alb-sg (0.0.0.0/0)</text>
  </g>


  <!-- ASG Boundary -->
  <rect x="150" y="380" width="900" height="230" rx="16" fill="#F0FDF4" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="170" y="365" width="300" height="30" fill="#F0FDF4"/>
  <text x="180" y="387" font-size="16" font-weight="700" fill="#047857">Auto Scaling Group: web-server-asg</text>
  
  <text x="180" y="415" font-size="13" font-weight="700" fill="#10B981">Min: 2 | Desired: 2 | Max: 4</text>

  <!-- ALB to EC2 Lines -->
  <path d="M 450 340 L 320 440" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>
  <path d="M 600 340 L 600 440" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>
  <path d="M 750 340 L 880 440" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>


  <!-- EC2 Instance 1 -->
  <g class="node floating">
    <rect class="card" x="190" y="440" width="230" height="130" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="190" y="440" width="230" height="36" rx="12" fill="url(#greenGrad)"/>
    <text x="305" y="465" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">EC2 Instance #1</text>
    <text x="305" y="500" font-size="13" class="title" text-anchor="middle">ap-south-1a</text>
    <text x="305" y="520" font-size="11" class="label" text-anchor="middle">Amazon Linux 2023 · t2.micro</text>
    <text x="305" y="540" font-size="11" class="label" text-anchor="middle">Apache httpd</text>
    <text x="305" y="560" font-size="12" font-weight="700" fill="#10B981" text-anchor="middle">✅ Healthy</text>
  </g>

  <!-- EC2 Instance 2 -->
  <g class="node floating-delay">
    <rect class="card" x="485" y="440" width="230" height="130" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="485" y="440" width="230" height="36" rx="12" fill="url(#greenGrad)"/>
    <text x="600" y="465" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">EC2 Instance #2</text>
    <text x="600" y="500" font-size="13" class="title" text-anchor="middle">ap-south-1b</text>
    <text x="600" y="520" font-size="11" class="label" text-anchor="middle">Amazon Linux 2023 · t2.micro</text>
    <text x="600" y="540" font-size="11" class="label" text-anchor="middle">Apache httpd</text>
    <text x="600" y="560" font-size="12" font-weight="700" fill="#10B981" text-anchor="middle">✅ Healthy</text>
  </g>

  <!-- EC2 Instance 3 (Scaled) -->
  <g class="node pulse-obj">
    <rect class="card" x="780" y="440" width="230" height="130" rx="12" fill="#FFFFFF" stroke="#F58536" stroke-width="1.5" stroke-dasharray="4,4" filter="url(#greenGlow)"/>
    <rect x="780" y="440" width="230" height="36" rx="12" fill="url(#orangeGrad)"/>
    <text x="895" y="465" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">EC2 Instance #3</text>
    <text x="895" y="500" font-size="13" class="title" text-anchor="middle">ap-south-1a or 1b</text>
    <text x="895" y="520" font-size="11" class="label" text-anchor="middle">Amazon Linux 2023 · t2.micro</text>
    <text x="895" y="540" font-size="11" class="label" text-anchor="middle">Apache httpd</text>
    <text x="895" y="560" font-size="12" font-weight="700" fill="#EA580C" text-anchor="middle">⏳ Scaled out (CPU > 50%)</text>
  </g>


  <!-- Bottom Supporting Services -->
  
  <!-- Launch Template -->
  <g class="node">
    <rect class="card" x="150" y="650" width="250" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="150" y="650" width="250" height="30" rx="12" fill="#F3F4F6"/>
    <rect x="150" y="665" width="250" height="15" fill="#F3F4F6"/>
    <text x="275" y="670" font-size="13" font-weight="700" fill="#374151" text-anchor="middle">Launch Template</text>
    <text x="275" y="705" font-size="13" class="title" text-anchor="middle">web-server-lt</text>
    <text x="275" y="725" font-size="11" class="label" text-anchor="middle">AMI: AL2023</text>
    <text x="275" y="745" font-size="11" class="label" text-anchor="middle">User Data: Installs Apache &amp; Stress</text>
  </g>

  <!-- CloudWatch -->
  <g class="node">
    <rect class="card" x="475" y="650" width="250" height="120" rx="12" fill="#FFFFFF" stroke="#FCE7F3" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="475" y="650" width="250" height="30" rx="12" fill="#FCE7F3"/>
    <rect x="475" y="665" width="250" height="15" fill="#FCE7F3"/>
    <text x="600" y="670" font-size="13" font-weight="700" fill="#DB2777" text-anchor="middle">CloudWatch Alarms</text>
    <text x="600" y="705" font-size="13" class="title" text-anchor="middle">Metric: CPU Utilization</text>
    <text x="600" y="725" font-size="11" class="label" text-anchor="middle">High: > 50% → Scale Out</text>
    <text x="600" y="745" font-size="11" class="label" text-anchor="middle">Low: &lt; 35% → Scale In</text>
  </g>

  <!-- Target Group -->
  <g class="node">
    <rect class="card" x="800" y="650" width="250" height="120" rx="12" fill="#FFFFFF" stroke="#CCFBF1" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="800" y="650" width="250" height="30" rx="12" fill="#CCFBF1"/>
    <rect x="800" y="665" width="250" height="15" fill="#CCFBF1"/>
    <text x="925" y="670" font-size="13" font-weight="700" fill="#0F766E" text-anchor="middle">Target Group</text>
    <text x="925" y="705" font-size="13" class="title" text-anchor="middle">web-server-tg</text>
    <text x="925" y="725" font-size="11" class="label" text-anchor="middle">Protocol: HTTP / Port: 80</text>
    <text x="925" y="745" font-size="11" class="label" text-anchor="middle">Health Check: HTTP GET /</text>
  </g>

  <path d="M 600 650 L 600 610" fill="none" stroke="#DB2777" stroke-width="3" marker-end="url(#arrow-purple)" class="flow-line"/>

</svg>
