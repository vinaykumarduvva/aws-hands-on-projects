<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#EA580C" />
    </marker>
  </defs>

  <style>
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .flow-line {
      stroke-dasharray: 6 6;
      animation: dash 1.5s linear infinite;
    }
    .flow-line:hover {
      stroke-width: 4px;
      cursor: pointer;
      filter: url(#glow);
    }
    .node {
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
    }
    .node:hover {
      transform: translateY(-5px);
    }
    .node:hover .card {
      filter: url(#hoverShadow);
    }
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    .floating-delay {
      animation: float 6s ease-in-out infinite;
      animation-delay: 3s;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="50" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 4 — S3 Versioning &amp; Replication</text>

  <!-- Region 1 Boundary -->
  <rect x="80" y="120" width="380" height="420" rx="20" fill="none" stroke="#0073BB" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="100" y="105" width="220" height="30" fill="#F8FAFC"/>
  <text x="110" y="127" font-size="20" font-weight="700" fill="#0073BB">Region: us-east-1</text>
  <text x="280" y="127" font-size="14" font-weight="500" fill="#6B7280">(N. Virginia)</text>

  <!-- Region 2 Boundary -->
  <rect x="640" y="120" width="380" height="420" rx="20" fill="none" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="660" y="105" width="220" height="30" fill="#F8FAFC"/>
  <text x="670" y="127" font-size="20" font-weight="700" fill="#8C4FFF">Region: us-west-2</text>
  <text x="840" y="127" font-size="14" font-weight="500" fill="#6B7280">(Oregon)</text>


  <!-- Flow Line (CRR) -->
  <path d="M 400 330 L 700 330" fill="none" stroke="#EA580C" stroke-width="4" marker-end="url(#arrow-orange)" class="flow-line"/>
  <rect x="470" y="305" width="160" height="20" rx="10" fill="#FFEDD5"/>
  <text x="550" y="319" font-size="11" font-weight="700" fill="#EA580C" text-anchor="middle">Cross-Region Replication</text>


  <!-- Nodes -->

  <!-- Source S3 Bucket -->
  <g class="node floating">
    <rect class="card" x="150" y="230" width="240" height="200" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="150" y="230" width="240" height="40" rx="12" fill="#FFF7ED"/>
    <rect x="150" y="250" width="240" height="20" fill="#FFF7ED"/>
    <text x="165" y="255" font-size="14" font-weight="700" fill="#C2410C">Amazon S3 (Source)</text>
    
    <circle cx="360" cy="250" r="14" fill="#FFEDD5"/>
    <path d="M 355 246 h 10 v 8 h -10 z" fill="#C2410C"/>

    <text x="165" y="300" font-size="20" class="title">Production Bucket</text>
    
    <!-- Badges -->
    <rect x="165" y="320" width="80" height="24" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
    <text x="205" y="336" font-size="11" font-weight="700" fill="#15803D" text-anchor="middle">Versioning</text>
    <rect x="165" y="355" width="210" height="50" rx="8" fill="#F3F4F6"/>
    <text x="175" y="375" font-size="12" font-weight="600" fill="#374151">Lifecycle Rule Active</text>
    <text x="175" y="390" font-size="11" font-weight="500" fill="#4B5563">Transitions objects to IA in 30 days</text>
  </g>

  <!-- Replica S3 Bucket -->
  <g class="node floating-delay">
    <rect class="card" x="710" y="230" width="240" height="200" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="710" y="230" width="240" height="40" rx="12" fill="#F5F3FF"/>
    <rect x="710" y="250" width="240" height="20" fill="#F5F3FF"/>
    <text x="725" y="255" font-size="14" font-weight="700" fill="#6D28D9">Amazon S3 (Replica)</text>
    
    <circle cx="920" cy="250" r="14" fill="#EDE9FE"/>
    <path d="M 915 246 h 10 v 8 h -10 z" fill="#6D28D9"/>

    <text x="725" y="300" font-size="20" class="title">Backup Bucket</text>
    
    <!-- Badges -->
    <rect x="725" y="320" width="80" height="24" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
    <text x="765" y="336" font-size="11" font-weight="700" fill="#15803D" text-anchor="middle">Versioning</text>
    <rect x="725" y="355" width="210" height="50" rx="8" fill="#F3F4F6"/>
    <text x="735" y="375" font-size="12" font-weight="600" fill="#374151">Disaster Recovery (DR)</text>
    <text x="735" y="390" font-size="11" font-weight="500" fill="#4B5563">Stores identical copies asynchronously</text>
  </g>

</svg>
