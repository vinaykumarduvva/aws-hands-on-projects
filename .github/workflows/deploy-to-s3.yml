name: Deploy Websites to AWS S3

on:
  push:
    # REMOVE or comment out branch/path filters temporarily during troubleshooting
    # This ensures the workflow actually triggers on whatever branch you push to
    branches:
      - main
    paths:
      - 'resources/AWS_Handy_Book/**'
      - 'resources/AWS_CloudShell_Commands/**'
      - '.github/workflows/deploy-to-s3.yml'

jobs:
  deploy:
    name: Sync to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          submodules: false

      # NEW DEBUG STEP: This prints your workspace folder structure
      - name: Debug Directory Structure
        run: |
          echo "=== Current Working Directory ==="
          pwd
          echo "=== Root Folder Contents ==="
          ls -la
          echo "=== Resources Folder Contents ==="
          ls -la resources/ || echo "resources folder not found!"
          echo "=== AWS Handy Book Contents ==="
          ls -la resources/AWS_Handy_Book/ || echo "AWS_Handy_Book folder not found!"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy AWS Handy Book to S3
        run: |
          aws s3 sync resources/AWS_Handy_Book/website/ s3://${{ secrets.HANDY_BOOK_S3_BUCKET }} --delete --exclude ".git/*"

      - name: Deploy CloudShell Commands to S3
        run: |
          aws s3 sync resources/AWS_CloudShell_Commands/ s3://${{ secrets.CLOUDSHELL_S3_BUCKET }} --delete --exclude ".git/*"
