<svg width="1200" height="800" viewBox="0 0 1200 800"
  xmlns="http://www.w3.org/2000/svg"
  font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10"
            refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->

  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- Title -->

<text x="600" y="40"
     text-anchor="middle"
     font-size="24"
     font-weight="bold"
     fill="#232f3e">
AWS CloudWatch Monitoring Architecture </text>

  <!-- Metric Sources -->

<rect x="40" y="90" width="220" height="140"
     fill="white" stroke="#ff9900" stroke-width="2" rx="8"/>

<rect x="40" y="90" width="220" height="35"
     fill="#ff9900" rx="8"/>

<text x="150" y="112"
     text-anchor="middle"
     font-size="14"
     font-weight="bold"
     fill="white">
EC2 Metrics </text>

<text x="55" y="150" font-size="12">CPUUtilization</text> <text x="55" y="170" font-size="12">NetworkIn</text> <text x="55" y="190" font-size="12">NetworkOut</text> <text x="55" y="210" font-size="12">StatusCheckFailed</text>

  <!-- RDS -->

<rect x="320" y="90" width="220" height="140"
     fill="white" stroke="#527fff" stroke-width="2" rx="8"/>

<rect x="320" y="90" width="220" height="35"
     fill="#527fff" rx="8"/>

<text x="430" y="112"
     text-anchor="middle"
     font-size="14"
     font-weight="bold"
     fill="white">
RDS Metrics </text>

<text x="335" y="150" font-size="12">CPUUtilization</text> <text x="335" y="170" font-size="12">DatabaseConnections</text> <text x="335" y="190" font-size="12">FreeStorageSpace</text>

  <!-- Billing -->

<rect x="600" y="90" width="220" height="140"
     fill="white" stroke="#c0392b" stroke-width="2" rx="8"/>

<rect x="600" y="90" width="220" height="35"
     fill="#c0392b" rx="8"/>

<text x="710" y="112"
     text-anchor="middle"
     font-size="14"
     font-weight="bold"
     fill="white">
Billing Metrics </text>

<text x="615" y="150" font-size="12">EstimatedCharges</text>

  <!-- Logs -->

<rect x="880" y="90" width="260" height="140"
     fill="white" stroke="#28a745" stroke-width="2" rx="8"/>

<rect x="880" y="90" width="260" height="35"
     fill="#28a745" rx="8"/>

<text x="1010" y="112"
     text-anchor="middle"
     font-size="14"
     font-weight="bold"
     fill="white">
CloudWatch Logs </text>

<text x="895" y="150" font-size="12">Metric Filter: ERROR</text> <text x="895" y="170" font-size="12">ApplicationErrors</text>

  <!-- CloudWatch Metrics -->

<rect x="250" y="300" width="700" height="70"
     fill="#fff8e1"
     stroke="#ff9900"
     stroke-width="2"
     rx="8"/>

<text x="600" y="330"
     text-anchor="middle"
     font-size="16"
     font-weight="bold">
CloudWatch Metrics Store </text>

<text x="600" y="355"
     text-anchor="middle"
     font-size="12">
AWS/EC2 • AWS/RDS • AWS/Billing • CustomMetrics </text>

  <!-- Arrows -->

<line x1="150" y1="230" x2="350" y2="300"
     stroke="#666" stroke-width="2"
     marker-end="url(#arrow)"/>

<line x1="430" y1="230" x2="500" y2="300"
     stroke="#666" stroke-width="2"
     marker-end="url(#arrow)"/>

<line x1="710" y1="230" x2="650" y2="300"
     stroke="#666" stroke-width="2"
     marker-end="url(#arrow)"/>

<line x1="1010" y1="230" x2="850" y2="300"
     stroke="#666" stroke-width="2"
     marker-end="url(#arrow)"/>

  <!-- Alarms -->

<rect x="40" y="450" width="480" height="220"
     fill="white"
     stroke="#e53935"
     stroke-width="2"
     rx="8"/>

<rect x="40" y="450" width="480" height="35"
     fill="#e53935" rx="8"/>

<text x="280" y="472"
     text-anchor="middle"
     font-size="14"
     font-weight="bold"
     fill="white">
CloudWatch Alarms </text>

<text x="60" y="520" font-size="12">• EC2-CPU-High</text> <text x="60" y="545" font-size="12">• EC2-StatusCheck-Failed</text> <text x="60" y="570" font-size="12">• EC2-NetworkIn-High</text> <text x="60" y="595" font-size="12">• RDS-CPU-High</text> <text x="60" y="620" font-size="12">• Billing-Alert-5USD</text> <text x="60" y="645" font-size="12">• App-Errors-High</text>

  <!-- Dashboard -->

<rect x="620" y="450" width="520" height="220"
     fill="white"
     stroke="#1a73e8"
     stroke-width="2"
     rx="8"/>

<rect x="620" y="450" width="520" height="35"
     fill="#1a73e8" rx="8"/>

<text x="880" y="472"
     text-anchor="middle"
     font-size="14"
     font-weight="bold"
     fill="white">
CloudWatch Dashboard </text>

<text x="640" y="520" font-size="12">Widget 1: EC2 CPU</text> <text x="640" y="545" font-size="12">Widget 2: EC2 Network</text> <text x="640" y="570" font-size="12">Widget 3: RDS CPU</text> <text x="640" y="595" font-size="12">Widget 4: RDS Connections</text> <text x="640" y="620" font-size="12">Widget 5: Billing</text> <text x="640" y="645" font-size="12">Widget 6: Alarm Status</text>

  <!-- SNS -->

<rect x="400" y="710" width="400" height="50"
     fill="#880e4f"
     rx="8"/>

<text x="600" y="740"
     text-anchor="middle"
     font-size="14"
     font-weight="bold"
     fill="white">
SNS Topic → Email Notifications </text>

</svg>
