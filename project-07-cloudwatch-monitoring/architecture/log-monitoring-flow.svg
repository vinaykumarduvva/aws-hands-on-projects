<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'AWS', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141b2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2444;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#111833;stop-opacity:0.95" />
    </linearGradient>
    
    <!-- Service gradients -->
    <linearGradient id="ec2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E07C1F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cwLogsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F58536;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D96B2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#536DFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="customMetricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="alarmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E03131;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="snsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4F8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC2266;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34A853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E7E34;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9900" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C4DFF" />
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00BCD4" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B6B" />
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF4F8B" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34A853" />
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8899BB" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1100" height="820" fill="url(#grid)"/>
  </g>

  <!-- ============ TITLE ============ -->
  <text x="550" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" filter="url(#glowSoft)">CloudWatch Log Monitoring Flow</text>
  <text x="550" y="58" text-anchor="middle" fill="#8899BB" font-size="12">EC2 → Log Group → Metric Filter → Custom Alarm → SNS → Email</text>

  <!-- ============================================================ -->
  <!-- SECTION 1: EC2 APPLICATION LOGS                                -->
  <!-- ============================================================ -->
  <rect x="30" y="80" width="1040" height="190" rx="12" fill="url(#boxGrad)" stroke="#2a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="108" fill="#8899BB" font-size="11" font-weight="600" letter-spacing="1">🔷 SOURCE — APPLICATION LOGS</text>
  <line x1="50" y1="114" x2="300" y2="114" stroke="#2a3a5c" stroke-width="1"/>

  <!-- EC2 Instance box -->
  <rect x="60" y="130" width="220" height="120" rx="10" fill="#FF9900" fill-opacity="0.1" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="60" y="130" width="220" height="32" rx="10" fill="#FF9900" fill-opacity="0.15"/>
  <rect x="60" y="152" width="220" height="10" rx="0" fill="#FF9900" fill-opacity="0.15"/>
  <text x="170" y="152" text-anchor="middle" fill="#FF9900" font-size="13" font-weight="700">☁️ EC2 Instance</text>
  <text x="75" y="178" fill="#ccd6f6" font-size="10">• Application: myapp-server</text>
  <text x="75" y="196" fill="#ccd6f6" font-size="10">• Logs: /var/log/myapp.log</text>
  <text x="75" y="214" fill="#8899BB" font-size="10">• CloudWatch Agent installed</text>
  <text x="75" y="232" fill="#8899BB" font-size="10">• Streaming logs to CloudWatch</text>

  <!-- Log stream visualization -->
  <rect x="320" y="130" width="380" height="120" rx="10" fill="#00D4FF" fill-opacity="0.05" stroke="#00D4FF" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="510" y="152" text-anchor="middle" fill="#00D4FF" font-size="11" font-weight="600">📋 Log Stream: app-server-1</text>
  
  <!-- Sample log lines -->
  <rect x="335" y="165" width="350" height="18" rx="3" fill="#1a2444" stroke="#2a3a5c" stroke-width="0.5"/>
  <text x="340" y="178" fill="#4CAF50" font-size="8" font-family="monospace">[INFO] Application started successfully</text>

  <rect x="335" y="187" width="350" height="18" rx="3" fill="#1a2444" stroke="#2a3a5c" stroke-width="0.5"/>
  <text x="340" y="200" fill="#4CAF50" font-size="8" font-family="monospace">[INFO] User login successful (user: john@example.com)</text>

  <rect x="335" y="209" width="350" height="18" rx="3" fill="#1a2444" stroke="#FF6B6B" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="340" y="222" fill="#FF6B6B" font-size="8" font-family="monospace">[ERROR] Database connection timeout — retrying...</text>

  <rect x="335" y="231" width="350" height="18" rx="3" fill="#1a2444" stroke="#FF6B6B" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="340" y="244" fill="#FF6B6B" font-size="8" font-family="monospace">[ERROR] Null pointer exception in OrderService</text>

  <!-- Arrow: EC2 → Log Stream -->
  <line x1="285" y1="190" x2="310" y2="190" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Log group info -->
  <rect x="740" y="130" width="310" height="120" rx="10" fill="#F58536" fill-opacity="0.06" stroke="#F58536" stroke-width="1"/>
  <text x="895" y="155" text-anchor="middle" fill="#F58536" font-size="11" font-weight="600">📁 Log Group Details</text>
  
  <text x="755" y="178" fill="#ccd6f6" font-size="10">Name:</text>
  <text x="800" y="178" fill="#8899BB" font-size="10" font-family="monospace">/aws/ec2/monitoring-test</text>
  
  <text x="755" y="198" fill="#ccd6f6" font-size="10">Retention:</text>
  <text x="800" y="198" fill="#8899BB" font-size="10">7 days (Free Tier)</text>
  
  <text x="755" y="218" fill="#ccd6f6" font-size="10">Streams:</text>
  <text x="800" y="218" fill="#8899BB" font-size="10">app-server-1, app-server-2</text>
  
  <text x="755" y="238" fill="#ccd6f6" font-size="10">Ingestion:</text>
  <text x="800" y="238" fill="#8899BB" font-size="10">~1.2 MB / day</text>

  <!-- Arrow: Log Stream → Log Group -->
  <line x1="705" y1="190" x2="730" y2="190" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowWhite)"/>

  <!-- ============================================================ -->
  <!-- SECTION 2: METRIC FILTER                                      -->
  <!-- ============================================================ -->
  <rect x="30" y="290" width="1040" height="170" rx="12" fill="url(#boxGrad)" stroke="#2a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="318" fill="#8899BB" font-size="11" font-weight="600" letter-spacing="1">🔷 METRIC FILTER — PATTERN MATCHING</text>
  <line x1="50" y1="324" x2="330" y2="324" stroke="#2a3a5c" stroke-width="1"/>

  <!-- Filter box -->
  <rect x="60" y="340" width="490" height="100" rx="10" fill="#7C4DFF" fill-opacity="0.08" stroke="#7C4DFF" stroke-width="1.5"/>
  <text x="305" y="365" text-anchor="middle" fill="#7C4DFF" font-size="13" font-weight="700">🔍 Metric Filter: ErrorCount</text>
  
  <!-- Filter pattern -->
  <rect x="80" y="378" width="450" height="20" rx="6" fill="#1a2444" stroke="#7C4DFF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="90" y="393" fill="#00D4FF" font-size="11" font-family="monospace">Filter Pattern: <tspan fill="#FF6B6B">"ERROR"</tspan></text>
  
  <text x="80" y="418" fill="#ccd6f6" font-size="10">→ Matches any log entry containing the word</text>
  <text x="80" y="434" fill="#ccd6f6" font-size="10">→ Each match increments the metric by <tspan fill="#00BCD4" font-weight="700">1</tspan> (defaultValue: 0)</text>

  <!-- Transformation details -->
  <rect x="580" y="340" width="470" height="100" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="815" y="365" text-anchor="middle" fill="#00BCD4" font-size="12" font-weight="600">⚙️ Metric Transformation</text>
  
  <rect x="600" y="380" width="430" height="22" rx="4" fill="#1a2444" stroke="#2a3a5c" stroke-width="0.5"/>
  <text x="610" y="396" fill="#ccd6f6" font-size="10" font-family="monospace">metricName = <tspan fill="#00BCD4">"ApplicationErrors"</tspan></text>
  
  <rect x="600" y="406" width="430" height="22" rx="4" fill="#1a2444" stroke="#2a3a5c" stroke-width="0.5"/>
  <text x="610" y="422" fill="#ccd6f6" font-size="10" font-family="monospace">namespace = <tspan fill="#00BCD4">"CustomMetrics"</tspan></text>

  <!-- Arrow from Log Group to Filter -->
  <path d="M 895 260 L 895 290 L 305 290 L 305 335" fill="none" stroke="#7C4DFF" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- ============================================================ -->
  <!-- SECTION 3: CUSTOM METRIC &amp; ALARM                              -->
  <!-- ============================================================ -->
  <rect x="30" y="480" width="1040" height="170" rx="12" fill="url(#boxGrad)" stroke="#2a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="508" fill="#8899BB" font-size="11" font-weight="600" letter-spacing="1">🔷 CUSTOM METRIC &amp; ALARM</text>
  <line x1="50" y1="514" x2="330" y2="514" stroke="#2a3a5c" stroke-width="1"/>

  <!-- Custom Metric -->
  <rect x="60" y="530" width="300" height="100" rx="10" fill="#00BCD4" fill-opacity="0.08" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="210" y="555" text-anchor="middle" fill="#00BCD4" font-size="12" font-weight="600">📊 Custom Metric</text>
  
  <text x="80" y="580" fill="#ccd6f6" font-size="10">Namespace:</text>
  <text x="155" y="580" fill="#00BCD4" font-size="10" font-family="monospace">CustomMetrics</text>
  
  <text x="80" y="600" fill="#ccd6f6" font-size="10">Metric:</text>
  <text x="155" y="600" fill="#00BCD4" font-size="10" font-family="monospace">ApplicationErrors</text>
  
  <text x="80" y="620" fill="#ccd6f6" font-size="10">Statistic:</text>
  <text x="155" y="620" fill="#00BCD4" font-size="10">Sum (per 5-min period)</text>

  <!-- Arrow: Filter → Custom Metric -->
  <path d="M 555 390 L 700 390 L 700 530 L 370 530" fill="none" stroke="#00BCD4" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Alarm box -->
  <rect x="390" y="530" width="320" height="100" rx="10" fill="#FF6B6B" fill-opacity="0.08" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="550" y="555" text-anchor="middle" fill="#FF6B6B" font-size="12" font-weight="600">🚨 CloudWatch Alarm</text>
  
  <text x="410" y="580" fill="#ccd6f6" font-size="10">Name:</text>
  <text x="485" y="580" fill="#FF6B6B" font-size="10" font-family="monospace">App-Errors-High</text>
  
  <text x="410" y="600" fill="#ccd6f6" font-size="10">Condition:</text>
  <text x="485" y="600" fill="#FF6B6B" font-size="10">Sum(ApplicationErrors) > <tspan font-weight="700">5</tspan></text>
  
  <text x="410" y="620" fill="#ccd6f6" font-size="10">Period:</text>
  <text x="485" y="620" fill="#FF6B6B" font-size="10">300 seconds (1 evaluation)</text>

  <!-- Sample data points -->
  <rect x="740" y="530" width="310" height="100" rx="10" fill="#1a2444" stroke="#2a3a5c" stroke-width="1"/>
  <text x="895" y="550" text-anchor="middle" fill="#8899BB" font-size="9">Metric data points (last 15 min)</text>
  
  <!-- Bar chart -->
  <rect x="760" y="560" width="20" height="50" rx="2" fill="#4CAF50" opacity="0.6"/>
  <rect x="790" y="580" width="20" height="30" rx="2" fill="#4CAF50" opacity="0.6"/>
  <rect x="820" y="555" width="20" height="55" rx="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="850" y="565" width="20" height="45" rx="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="880" y="570" width="20" height="40" rx="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="910" y="560" width="20" height="50" rx="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="940" y="575" width="20" height="35" rx="2" fill="#FFA726" opacity="0.6"/>
  <rect x="970" y="590" width="20" height="20" rx="2" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Threshold line -->
  <line x1="755" y1="575" x2="995" y2="575" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1000" y="579" fill="#FF6B6B" font-size="8">threshold=5</text>

  <!-- ============================================================ -->
  <!-- SECTION 4: SNS &amp; EMAIL                                        -->
  <!-- ============================================================ -->
  <rect x="30" y="670" width="1040" height="100" rx="12" fill="url(#boxGrad)" stroke="#2a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="698" fill="#8899BB" font-size="11" font-weight="600" letter-spacing="1">🔷 NOTIFICATION DELIVERY</text>
  <line x1="50" y1="704" x2="300" y2="704" stroke="#2a3a5c" stroke-width="1"/>

  <!-- SNS -->
  <rect x="60" y="718" width="340" height="40" rx="20" fill="#FF4F8B" fill-opacity="0.12" stroke="#FF4F8B" stroke-width="1.5" filter="url(#glowSoft)"/>
  <text x="230" y="743" text-anchor="middle" fill="#FF4F8B" font-size="14" font-weight="700">📨 SNS Topic: monitoring-alerts</text>

  <!-- Arrow: Alarm → SNS -->
  <path d="M 550 580 L 550 670 L 230 670 L 230 713" fill="none" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrowRed)"/>
  
  <!-- Arrow: SNS → Email -->
  <line x1="405" y1="738" x2="445" y2="738" stroke="#FF4F8B" stroke-width="2" marker-end="url(#arrowPink)"/>

  <!-- Email -->
  <rect x="455" y="718" width="300" height="40" rx="10" fill="#34A853" fill-opacity="0.1" stroke="#34A853" stroke-width="1.5"/>
  <text x="605" y="735" text-anchor="middle" fill="#34A853" font-size="12" font-weight="600">✉️ Email: your@email.com</text>
  <text x="605" y="751" text-anchor="middle" fill="#8899BB" font-size="9">✅ Subscription confirmed</text>

  <!-- Sample email notification -->
  <rect x="790" y="714" width="260" height="45" rx="8" fill="#1a2444" stroke="#34A853" stroke-width="1" stroke-opacity="0.3"/>
  <text x="810" y="732" fill="#FF6B6B" font-size="10" font-weight="600">🔴 ALARM: App-Errors-High</text>
  <text x="810" y="750" fill="#8899BB" font-size="9">6 errors detected in last 5 minutes</text>

  <!-- ============================================================ -->
  <!-- FOOTER — LEGEND &amp; METRICS                                     -->
  <!-- ============================================================ -->
  <rect x="30" y="785" width="1040" height="25" rx="4" fill="#111833" stroke="#2a3a5c" stroke-width="0.5"/>
  
  <text x="50" y="802" fill="#8899BB" font-size="9">Pipeline:</text>
  
  <text x="100" y="802" fill="#FF9900" font-size="9">EC2 Logs</text>
  <line x1="160" y1="799" x2="175" y2="799" stroke="#8899BB" stroke-width="1" marker-end="url(#arrowWhite)"/>
  
  <text x="185" y="802" fill="#F58536" font-size="9">Log Group</text>
  <line x1="250" y1="799" x2="265" y2="799" stroke="#8899BB" stroke-width="1" marker-end="url(#arrowWhite)"/>
  
  <text x="275" y="802" fill="#7C4DFF" font-size="9">Metric Filter</text>
  <line x1="350" y1="799" x2="365" y2="799" stroke="#8899BB" stroke-width="1" marker-end="url(#arrowWhite)"/>
  
  <text x="375" y="802" fill="#00BCD4" font-size="9">Custom Metric</text>
  <line x1="455" y1="799" x2="470" y2="799" stroke="#8899BB" stroke-width="1" marker-end="url(#arrowWhite)"/>
  
  <text x="480" y="802" fill="#FF6B6B" font-size="9">Alarm</text>
  <line x1="520" y1="799" x2="535" y2="799" stroke="#8899BB" stroke-width="1" marker-end="url(#arrowWhite)"/>
  
  <text x="545" y="802" fill="#FF4F8B" font-size="9">SNS</text>
  <line x1="580" y1="799" x2="595" y2="799" stroke="#8899BB" stroke-width="1" marker-end="url(#arrowWhite)"/>
  
  <text x="605" y="802" fill="#34A853" font-size="9">Email Alert</text>

  <!-- Status badges -->
  <rect x="760" y="790" width="70" height="16" rx="3" fill="#4CAF50" fill-opacity="0.15" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="795" y="802" text-anchor="middle" fill="#4CAF50" font-size="8">✅ Filter active</text>
  
  <rect x="840" y="790" width="70" height="16" rx="3" fill="#FF6B6B" fill-opacity="0.15" stroke="#FF6B6B" stroke-width="0.5"/>
  <text x="875" y="802" text-anchor="middle" fill="#FF6B6B" font-size="8">🔴 Alarm ready</text>
  
  <rect x="920" y="790" width="80" height="16" rx="3" fill="#FF4F8B" fill-opacity="0.15" stroke="#FF4F8B" stroke-width="0.5"/>
  <text x="960" y="802" text-anchor="middle" fill="#FF4F8B" font-size="8">📨 SNS subscribed</text>

  <!-- Decorative dots -->
  <circle cx="1025" cy="798" r="2" fill="#FF9900" opacity="0.3"/>
  <circle cx="1035" cy="798" r="2" fill="#7C4DFF" opacity="0.3"/>
  <circle cx="1045" cy="798" r="2" fill="#00BCD4" opacity="0.3"/>
</svg>