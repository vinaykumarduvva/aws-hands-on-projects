<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Component Gradients -->
    <linearGradient id="ec2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    
    <linearGradient id="cwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E7157B"/>
      <stop offset="100%" stop-color="#C20D64"/>
    </linearGradient>

    <linearGradient id="snsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4F8B"/>
      <stop offset="100%" stop-color="#D93068"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feFlood flood-color="#EF4444" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#E7157B" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#EF4444" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -40; } }
    @keyframes fast-dash { to { stroke-dashoffset: -60; } }
    .flow-line { stroke-dasharray: 8 8; animation: dash 2s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .alert-line { stroke-dasharray: 8 8; animation: fast-dash 1s linear infinite; }
    
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.4)); stroke: #EF4444; }
      50% { filter: drop-shadow(0 0 16px rgba(239, 68, 68, 0.9)); stroke: #DC2626; }
      100% { filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.4)); stroke: #EF4444; }
    }
    .pulse-obj .card { animation: pulse 2.5s infinite; stroke-width: 2.5px; }

    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 07 Architecture</text>
  <text x="550" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">CloudWatch Monitoring, Alarms &amp; SNS Notifications</text>

  <!-- AWS Cloud Boundary -->
  <rect x="50" y="100" width="1000" height="660" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="70" y="85" width="220" height="30" fill="#F8FAFC"/>
  <text x="80" y="107" font-size="20" font-weight="700" fill="#F58536">AWS Cloud</text>

  <!-- CloudWatch Services Boundary -->
  <rect x="420" y="140" width="340" height="580" rx="16" fill="#FDF2F8" stroke="#DB2777" stroke-width="2"/>
  <rect x="440" y="125" width="200" height="30" fill="#F8FAFC"/>
  <text x="450" y="147" font-size="16" font-weight="700" fill="#DB2777">Amazon CloudWatch</text>


  <!-- Lines -->
  <!-- EC2 to Logs -->
  <path d="M 330 250 L 490 250" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <rect x="360" y="225" width="100" height="20" rx="10" fill="#E0F2FE"/>
  <text x="410" y="239" font-size="11" font-weight="700" fill="#0073BB" text-anchor="middle">Agent Logs</text>

  <!-- EC2 to Metrics -->
  <path d="M 330 380 L 490 380" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <rect x="360" y="355" width="100" height="20" rx="10" fill="#E0F2FE"/>
  <text x="410" y="369" font-size="11" font-weight="700" fill="#0073BB" text-anchor="middle">System Metrics</text>

  <!-- Logs to Metrics Filter -->
  <path d="M 590 310 L 590 340" fill="none" stroke="#E7157B" stroke-width="3" marker-end="url(#arrow-pink)" class="flow-line"/>
  <rect x="540" y="315" width="100" height="20" rx="10" fill="#FCE7F3"/>
  <text x="590" y="329" font-size="11" font-weight="700" fill="#E7157B" text-anchor="middle">Metric Filter</text>

  <!-- Metrics to Alarms -->
  <path d="M 590 440 L 590 530" fill="none" stroke="#E7157B" stroke-width="3" marker-end="url(#arrow-pink)" class="flow-line"/>
  <rect x="540" y="475" width="100" height="20" rx="10" fill="#FCE7F3"/>
  <text x="590" y="489" font-size="11" font-weight="700" fill="#E7157B" text-anchor="middle">Trigger</text>

  <!-- EC2 Status to Alarms -->
  <path d="M 230 420 L 230 590 L 490 590" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <rect x="360" y="565" width="100" height="20" rx="10" fill="#E0F2FE"/>
  <text x="410" y="579" font-size="11" font-weight="700" fill="#0073BB" text-anchor="middle">Status Checks</text>

  <!-- Alarms to SNS -->
  <path d="M 690 590 L 830 590" fill="none" stroke="#EF4444" stroke-width="4" marker-end="url(#arrow-red)" class="alert-line"/>
  <rect x="730" y="565" width="80" height="20" rx="10" fill="#FEF2F2"/>
  <text x="770" y="579" font-size="11" font-weight="800" fill="#EF4444" text-anchor="middle">ALARM</text>

  <!-- SNS to Admins -->
  <path d="M 915 530 L 915 390" fill="none" stroke="#EF4444" stroke-width="4" marker-end="url(#arrow-red)" class="alert-line"/>
  <rect x="850" y="450" width="130" height="20" rx="10" fill="#FEF2F2"/>
  <text x="915" y="464" font-size="11" font-weight="800" fill="#EF4444" text-anchor="middle">Push Notification</text>

  <!-- Nodes -->

  <!-- EC2 Instance -->
  <g class="node floating">
    <rect class="card" x="130" y="220" width="200" height="200" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="130" y="220" width="200" height="50" rx="12" fill="url(#ec2Grad)"/>
    <circle cx="230" cy="245" r="16" fill="#ffffff" fill-opacity="0.2"/>
    <text x="230" y="251" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">EC2</text>
    
    <text x="230" y="300" font-size="18" class="title" text-anchor="middle">Web Server</text>
    <text x="230" y="325" font-size="13" class="label" text-anchor="middle">Amazon Linux 2023</text>
    <text x="230" y="345" font-size="13" class="label" text-anchor="middle">CW Agent Installed</text>
    
    <rect x="150" y="370" width="160" height="30" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
    <text x="230" y="389" font-size="11" font-weight="700" fill="#15803D" text-anchor="middle">Emits Metrics &amp; Logs</text>
  </g>


  <!-- CloudWatch Logs -->
  <g class="node floating-delay">
    <rect class="card" x="460" y="190" width="260" height="120" rx="12" fill="#FFFFFF" stroke="#FCE7F3" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="460" y="190" width="260" height="40" rx="12" fill="url(#cwGrad)"/>
    <text x="590" y="215" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">CloudWatch Logs</text>
    
    <text x="590" y="260" font-size="18" class="title" text-anchor="middle">Log Groups</text>
    <text x="590" y="285" font-size="13" class="label" text-anchor="middle">/aws/ec2/app-logs</text>
  </g>

  <!-- CloudWatch Metrics & Dashboards -->
  <g class="node floating">
    <rect class="card" x="460" y="350" width="260" height="90" rx="12" fill="#FFFFFF" stroke="#FCE7F3" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="460" y="350" width="260" height="40" rx="12" fill="url(#cwGrad)"/>
    <text x="590" y="375" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">CloudWatch Dashboard</text>
    
    <text x="590" y="420" font-size="14" class="title" text-anchor="middle">Visualizes CPU, Network, Disk</text>
  </g>

  <!-- CloudWatch Alarms -->
  <g class="node pulse-obj">
    <rect class="card" x="460" y="540" width="230" height="120" rx="12" fill="#FFFFFF" filter="url(#redGlow)"/>
    <rect x="460" y="540" width="230" height="40" rx="12" fill="#EF4444"/>
    <text x="575" y="565" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">CloudWatch Alarms</text>
    
    <text x="575" y="610" font-size="16" font-weight="800" fill="#DC2626" text-anchor="middle">CPU &gt; 80%</text>
    <text x="575" y="635" font-size="16" font-weight="800" fill="#DC2626" text-anchor="middle">Status Check Failed</text>
  </g>

  <!-- SNS Topic -->
  <g class="node pulse-obj">
    <rect class="card" x="800" y="530" width="230" height="120" rx="12" fill="#FFFFFF" filter="url(#redGlow)"/>
    <rect x="800" y="530" width="230" height="40" rx="12" fill="url(#snsGrad)"/>
    <text x="915" y="555" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Amazon SNS</text>
    
    <text x="915" y="600" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Alerts Topic</text>
    <text x="915" y="625" font-size="13" class="label" text-anchor="middle">ops-critical-alerts</text>
  </g>

  <!-- Administrators -->
  <g class="node">
    <rect class="card" x="800" y="270" width="230" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="800" y="270" width="230" height="40" rx="12" fill="#3B82F6"/>
    <text x="915" y="295" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Administrators</text>
    
    <text x="915" y="340" font-size="18" class="title" text-anchor="middle">Email &amp; SMS Inbox</text>
    <text x="915" y="365" font-size="13" class="label" text-anchor="middle">Receives Instant Alerts</text>
  </g>
</svg>
