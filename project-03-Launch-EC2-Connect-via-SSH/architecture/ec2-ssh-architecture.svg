<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Component Gradients -->
    <linearGradient id="ec2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    
    <linearGradient id="igwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C4FFF"/>
      <stop offset="100%" stop-color="#6B2ED5"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#8C4FFF" />
    </marker>
  </defs>

  <style>
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .flow-line {
      stroke-dasharray: 6 6;
      animation: dash 1.5s linear infinite;
    }
    .flow-line:hover {
      stroke-width: 4px;
      cursor: pointer;
      filter: url(#glow);
    }
    .node {
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
    }
    .node:hover {
      transform: translateY(-5px);
    }
    .node:hover .card {
      filter: url(#hoverShadow);
    }
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    .floating-delay {
      animation: float 6s ease-in-out infinite;
      animation-delay: 3s;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="50" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 3 — EC2 &amp; SSH Connect</text>

  <!-- AWS Cloud Boundary -->
  <rect x="350" y="90" width="700" height="520" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="370" y="75" width="200" height="30" fill="#F8FAFC"/>
  <text x="380" y="97" font-size="20" font-weight="700" fill="#F58536">AWS Cloud (VPC)</text>

  <!-- Public Subnet Boundary -->
  <rect x="620" y="140" width="400" height="420" rx="16" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <rect x="640" y="125" width="130" height="30" fill="#F8FAFC"/>
  <text x="650" y="147" font-size="16" font-weight="700" fill="#16A34A">Public Subnet</text>

  <!-- Security Group Boundary -->
  <rect x="650" y="220" width="340" height="300" rx="12" fill="#FFFFFF" stroke="#DC2626" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="670" y="205" width="140" height="30" fill="#F0FDF4"/>
  <text x="680" y="227" font-size="14" font-weight="700" fill="#DC2626">Security Group</text>
  <text x="825" y="227" font-size="12" font-weight="600" fill="#4B5563">Allow Inbound Port 22</text>

  <!-- Flow Lines -->
  
  <!-- Developer to IGW -->
  <path d="M 230 360 L 405 360" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <rect x="250" y="335" width="120" height="20" rx="10" fill="#ECFEFF"/>
  <text x="310" y="349" font-size="11" font-weight="700" fill="#0073BB" text-anchor="middle">SSH over Internet</text>

  <!-- IGW to EC2 -->
  <path d="M 540 360 L 695 360" fill="none" stroke="#8C4FFF" stroke-width="3" marker-end="url(#arrow-purple)" class="flow-line"/>
  <rect x="560" y="335" width="100" height="20" rx="10" fill="#F3E8FF"/>
  <text x="610" y="349" font-size="11" font-weight="700" fill="#8C4FFF" text-anchor="middle">VPC Routing</text>

  <!-- Nodes -->

  <!-- Developer Workstation -->
  <g class="node">
    <rect class="card" x="40" y="300" width="190" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="40" y="300" width="190" height="36" rx="12" fill="#F3F4F6"/>
    <rect x="40" y="316" width="190" height="20" fill="#F3F4F6"/>
    
    <text x="55" y="324" font-size="14" font-weight="700" fill="#4B5563">Client</text>
    
    <text x="55" y="365" font-size="18" class="title">Developer</text>
    <text x="55" y="390" font-size="12" class="label">ssh -i key.pem user@IP</text>
    
    <!-- Laptop Icon -->
    <path d="M 195 320 h 14 v -8 c 0 -1 -1 -2 -2 -2 h -10 c -1 0 -2 1 -2 2 v 8 m -4 0 h 22 v 2 h -22 v -2" fill="#9CA3AF"/>
  </g>

  <!-- Internet Gateway (IGW) -->
  <g class="node floating">
    <rect class="card" x="410" y="300" width="130" height="120" rx="16" fill="url(#igwGrad)" filter="url(#shadow)"/>
    <!-- IGW Icon -->
    <circle cx="475" cy="340" r="18" fill="#ffffff" fill-opacity="0.2"/>
    <path d="M 465 340 A 10 10 0 1 1 485 340 A 10 10 0 1 1 465 340 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="475" y="385" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">IGW</text>
    <text x="475" y="405" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" fill-opacity="0.9">Internet Gateway</text>
  </g>

  <!-- EC2 Instance -->
  <g class="node floating-delay">
    <rect class="card" x="710" y="280" width="230" height="160" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="710" y="280" width="230" height="40" rx="12" fill="#FFF7ED"/>
    <rect x="710" y="300" width="230" height="20" fill="#FFF7ED"/>
    <text x="725" y="305" font-size="14" font-weight="700" fill="#C2410C">Amazon EC2</text>
    
    <circle cx="915" cy="300" r="14" fill="#FFEDD5"/>
    <rect x="908" y="293" width="14" height="14" fill="none" stroke="#C2410C" stroke-width="2"/>

    <text x="725" y="350" font-size="20" class="title">Virtual Server</text>
    <text x="725" y="375" font-size="13" class="label">OS: Amazon Linux 2023</text>
    <text x="725" y="395" font-size="13" class="label">Instance Type: t2.micro</text>
    <text x="725" y="415" font-size="13" class="label">Public IP Auto-Assigned</text>
  </g>

</svg>
