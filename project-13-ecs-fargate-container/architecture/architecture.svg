<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>

    <!-- Component Gradients -->
    <linearGradient id="albGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C4FFF"/>
      <stop offset="100%" stop-color="#6B2ED5"/>
    </linearGradient>

    <linearGradient id="taskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fdfdfd"/>
    </linearGradient>

    <linearGradient id="ecrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>

    <linearGradient id="iamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1212B"/>
      <stop offset="100%" stop-color="#A40008"/>
    </linearGradient>

    <linearGradient id="cwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff0f0"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-user" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#6B7280" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#8C4FFF" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#F58536" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#E1212B" />
    </marker>
  </defs>

  <style>
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .flow-line {
      stroke-dasharray: 6 6;
      animation: dash 1.5s linear infinite;
    }
    .flow-line:hover {
      stroke-width: 4px;
      cursor: pointer;
      filter: url(#glow);
    }
    
    .node {
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
    }
    .node:hover {
      transform: translateY(-5px);
    }
    .node:hover .card {
      filter: url(#hoverShadow);
    }
    
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    .floating-delay {
      animation: float 6s ease-in-out infinite;
      animation-delay: 3s;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    /* Typography */
    text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .title { font-weight: 700; fill: #111827; }
    .subtitle { font-weight: 500; fill: #4B5563; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
    .text-white { font-weight: 600; fill: #FFFFFF; }
    
    .box-title { font-weight: 700; fill: #374151; font-size: 20px; }
  </style>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- AWS Cloud Boundary -->
  <rect x="220" y="40" width="1020" height="700" rx="20" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="240" y="25" width="230" height="30" fill="#F9FAFB"/>
  <text x="250" y="47" class="box-title" fill="#FF9900">AWS Cloud (ap-south-1)</text>

  <!-- VPC Boundary -->
  <rect x="250" y="100" width="650" height="460" rx="16" fill="#F0F8FF" stroke="#0073BB" stroke-width="2"/>
  <rect x="270" y="85" width="130" height="30" fill="#F9FAFB"/>
  <text x="280" y="107" font-size="18" font-weight="700" fill="#0073BB">Default VPC</text>

  <!-- Availability Zones -->
  <!-- AZ1 -->
  <rect x="580" y="130" width="290" height="180" rx="12" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,6"/>
  <text x="595" y="155" font-size="14" class="label" fill="#6B7280">Availability Zone (ap-south-1a)</text>
  
  <!-- AZ2 -->
  <rect x="580" y="350" width="290" height="180" rx="12" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,6"/>
  <text x="595" y="375" font-size="14" class="label" fill="#6B7280">Availability Zone (ap-south-1b)</text>

  <!-- Connections (Lines drawn first so they are under nodes) -->
  
  <!-- User to ALB -->
  <path d="M 140 330 L 280 330" fill="none" stroke="#6B7280" stroke-width="3" marker-end="url(#arrow-user)" class="flow-line"/>
  
  <!-- ALB to Target Group -->
  <path d="M 450 330 L 480 330" fill="none" stroke="#8C4FFF" stroke-width="3.5" marker-end="url(#arrow-purple)" class="flow-line"/>

  <!-- Target Group to Task 1 -->
  <path d="M 570 320 C 590 320, 590 220, 605 220" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <!-- Target Group to Task 2 -->
  <path d="M 570 340 C 590 340, 590 440, 605 440" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>

  <!-- Task to ECR (Image Pull) -->
  <path d="M 855 200 L 925 200" fill="none" stroke="#F58536" stroke-width="2.5" marker-end="url(#arrow-orange)" class="flow-line"/>
  <path d="M 855 420 C 890 420, 890 230, 925 230" fill="none" stroke="#F58536" stroke-width="2.5" marker-end="url(#arrow-orange)" class="flow-line"/>

  <!-- Task to CloudWatch (Logs) -->
  <path d="M 855 240 C 890 240, 890 430, 925 430" fill="none" stroke="#E1212B" stroke-width="2.5" marker-end="url(#arrow-red)" class="flow-line"/>
  <path d="M 855 460 L 925 460" fill="none" stroke="#E1212B" stroke-width="2.5" marker-end="url(#arrow-red)" class="flow-line"/>

  <!-- Task to IAM (Roles) -->
  <path d="M 725 300 L 725 640 L 690 640" fill="none" stroke="#E1212B" stroke-width="2" marker-end="url(#arrow-red)" class="flow-line"/>
  <path d="M 725 520 L 725 640" fill="none" stroke="#E1212B" stroke-width="2" />

  <!-- Nodes (drawn last so they are on top) -->
  
  <!-- User -->
  <g class="node">
    <circle class="card" cx="90" cy="330" r="50" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="335" font-size="18" text-anchor="middle" class="title">Users</text>
    <text x="90" y="355" font-size="12" text-anchor="middle" class="label">Internet</text>
  </g>

  <!-- Application Load Balancer -->
  <g class="node">
    <rect class="card" x="290" y="260" width="160" height="140" rx="16" fill="url(#albGrad)" filter="url(#shadow)"/>
    <circle cx="370" cy="300" r="20" fill="#ffffff" fill-opacity="0.2"/>
    <path d="M 360 300 L 370 290 L 380 300 L 370 310 Z" fill="#ffffff"/>
    <text x="370" y="345" font-size="18" text-anchor="middle" class="text-white">Application</text>
    <text x="370" y="365" font-size="16" text-anchor="middle" class="text-white" font-weight="500">Load Balancer</text>
    <text x="370" y="385" font-size="12" text-anchor="middle" class="text-white" fill-opacity="0.8">Port 80</text>
  </g>

  <!-- Target Group -->
  <g class="node">
    <rect class="card" x="490" y="290" width="80" height="80" rx="10" fill="#FFFFFF" stroke="#8C4FFF" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="530" y="325" font-size="14" text-anchor="middle" class="title" fill="#8C4FFF">Target</text>
    <text x="530" y="345" font-size="14" text-anchor="middle" class="title" fill="#8C4FFF">Group</text>
    <text x="530" y="360" font-size="11" text-anchor="middle" class="label">Port 5000</text>
  </g>

  <!-- ECS Task 1 (AZ1) -->
  <g class="node floating">
    <rect class="card" x="615" y="170" width="240" height="130" rx="12" fill="url(#taskGrad)" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="615" y="170" width="240" height="40" rx="12" fill="#EFF6FF"/>
    <rect x="615" y="190" width="240" height="20" fill="#EFF6FF"/> 
    <text x="630" y="195" font-size="15" font-weight="700" fill="#1D4ED8">ECS Task (Fargate)</text>
    <circle cx="835" cy="190" r="6" fill="#10B981" filter="url(#glow)"/>
    
    <text x="630" y="235" font-size="17" class="title">Flask Web App</text>
    <text x="630" y="260" font-size="13" class="label">vCPU: 0.5  |  RAM: 1 GB</text>
    <text x="630" y="280" font-size="13" class="label">Container Port: 5000</text>
  </g>

  <!-- ECS Task 2 (AZ2) -->
  <g class="node floating-delay">
    <rect class="card" x="615" y="390" width="240" height="130" rx="12" fill="url(#taskGrad)" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="615" y="390" width="240" height="40" rx="12" fill="#EFF6FF"/>
    <rect x="615" y="410" width="240" height="20" fill="#EFF6FF"/> 
    <text x="630" y="415" font-size="15" font-weight="700" fill="#1D4ED8">ECS Task (Fargate)</text>
    <circle cx="835" cy="410" r="6" fill="#10B981" filter="url(#glow)"/>
    
    <text x="630" y="455" font-size="17" class="title">Flask Web App</text>
    <text x="630" y="480" font-size="13" class="label">vCPU: 0.5  |  RAM: 1 GB</text>
    <text x="630" y="500" font-size="13" class="label">Container Port: 5000</text>
  </g>

  <!-- ECR Repository -->
  <g class="node">
    <rect class="card" x="935" y="150" width="230" height="110" rx="16" fill="url(#ecrGrad)" filter="url(#shadow)"/>
    <text x="1050" y="195" font-size="20" text-anchor="middle" class="text-white">Amazon ECR</text>
    <text x="1050" y="220" font-size="14" text-anchor="middle" class="text-white" fill-opacity="0.9">flask-app:latest</text>
    <text x="1050" y="240" font-size="12" text-anchor="middle" class="text-white" fill-opacity="0.7">Private Registry</text>
  </g>

  <!-- CloudWatch Logs -->
  <g class="node">
    <rect class="card" x="935" y="390" width="230" height="110" rx="16" fill="url(#cwGrad)" stroke="#E1212B" stroke-width="2" filter="url(#shadow)"/>
    <text x="1050" y="435" font-size="20" text-anchor="middle" class="title" fill="#E1212B">CloudWatch Logs</text>
    <text x="1050" y="460" font-size="14" text-anchor="middle" class="label" fill="#4B5563">/ecs/flask-app-task</text>
    <text x="1050" y="480" font-size="12" text-anchor="middle" class="label" fill="#9CA3AF">Container stdout/stderr</text>
  </g>

  <!-- IAM Roles -->
  <g class="node">
    <rect class="card" x="450" y="590" width="230" height="110" rx="16" fill="url(#iamGrad)" filter="url(#shadow)"/>
    <text x="565" y="635" font-size="20" text-anchor="middle" class="text-white">AWS IAM</text>
    <text x="565" y="660" font-size="14" text-anchor="middle" class="text-white" fill-opacity="0.9">ecs-task-execution-role</text>
    <text x="565" y="680" font-size="14" text-anchor="middle" class="text-white" fill-opacity="0.9">ecs-task-role</text>
  </g>

</svg>
