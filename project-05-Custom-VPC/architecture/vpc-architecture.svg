<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#EA580C" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#16A34A" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -20; } }
    .flow-line { stroke-dasharray: 6 6; animation: dash 1.5s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  <text x="550" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 5 — Custom VPC Architecture</text>
  <text x="550" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">CIDR: 10.0.0.0/16 · Region: us-east-1</text>

  <!-- AWS Cloud Boundary -->
  <rect x="50" y="200" width="1000" height="560" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="70" y="185" width="220" height="30" fill="#F8FAFC"/>
  <text x="80" y="207" font-size="20" font-weight="700" fill="#F58536">AWS Cloud (VPC)</text>

  <!-- Availability Zones -->
  <!-- AZ A -->
  <rect x="80" y="240" width="440" height="490" rx="16" fill="#F0F8FF" stroke="#0073BB" stroke-width="2"/>
  <rect x="100" y="225" width="230" height="30" fill="#F8FAFC"/>
  <text x="110" y="247" font-size="16" font-weight="700" fill="#0073BB">Availability Zone A (us-east-1a)</text>

  <!-- AZ B -->
  <rect x="580" y="240" width="440" height="490" rx="16" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <rect x="600" y="225" width="230" height="30" fill="#F8FAFC"/>
  <text x="610" y="247" font-size="16" font-weight="700" fill="#EA580C">Availability Zone B (us-east-1b)</text>

  <!-- Subnets in AZ A -->
  <rect x="100" y="280" width="400" height="200" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="120" y="305" font-size="14" font-weight="700" fill="#15803D">Public Subnet A (10.0.1.0/24)</text>

  <rect x="100" y="500" width="400" height="200" rx="12" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="120" y="525" font-size="14" font-weight="700" fill="#B91C1C">Private Subnet A (10.0.3.0/24)</text>

  <!-- Subnets in AZ B -->
  <rect x="600" y="280" width="400" height="200" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="620" y="305" font-size="14" font-weight="700" fill="#15803D">Public Subnet B (10.0.2.0/24)</text>

  <rect x="600" y="500" width="400" height="200" rx="12" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="620" y="525" font-size="14" font-weight="700" fill="#B91C1C">Private Subnet B (10.0.4.0/24)</text>

  <!-- Nodes (Outside VPC) -->
  <g class="node">
    <rect class="card" x="430" y="80" width="240" height="50" rx="25" fill="#FFFFFF" stroke="#0073BB" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="455" cy="105" r="14" fill="#E0F2FE"/>
    <text x="550" y="111" font-size="18" font-weight="700" fill="#0073BB" text-anchor="middle">Internet</text>
  </g>

  <!-- Internet to IGW Flow -->
  <path d="M 550 130 L 550 170" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>

  <!-- IGW -->
  <g class="node floating">
    <rect class="card" x="450" y="150" width="200" height="60" rx="12" fill="#FFFFFF" stroke="#F58536" stroke-width="2" filter="url(#shadow)"/>
    <text x="550" y="175" font-size="16" font-weight="700" fill="#C2410C" text-anchor="middle">Internet Gateway</text>
    <text x="550" y="195" font-size="12" font-weight="500" fill="#6B7280" text-anchor="middle">my-vpc-igw</text>
  </g>

  <!-- Flow Lines inside VPC -->
  <path d="M 450 180 L 300 180 L 300 280" fill="none" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow-orange)" class="flow-line"/>
  <path d="M 650 180 L 800 180 L 800 280" fill="none" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow-orange)" class="flow-line"/>

  <!-- NAT Route -->
  <path d="M 390 410 L 390 500" fill="none" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>
  <rect x="340" y="445" width="100" height="20" rx="10" fill="#DCFCE7"/>
  <text x="390" y="459" font-size="11" font-weight="700" fill="#15803D" text-anchor="middle">NAT Route</text>


  <!-- Instances in AZ A -->
  <!-- Bastion -->
  <g class="node floating">
    <rect class="card" x="120" y="325" width="170" height="130" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="120" y="325" width="170" height="36" rx="12" fill="#F0FDF4"/>
    <rect x="120" y="341" width="170" height="20" fill="#F0FDF4"/>
    <text x="205" y="349" font-size="14" font-weight="700" fill="#15803D" text-anchor="middle">Bastion Host</text>
    <text x="205" y="385" font-size="13" class="label" text-anchor="middle">Amazon Linux</text>
    <text x="205" y="405" font-size="13" class="label" text-anchor="middle">t2.micro</text>
    <text x="205" y="435" font-size="12" font-weight="600" fill="#0073BB" text-anchor="middle">Public IP: 54.x.x.x</text>
  </g>

  <!-- NAT Gateway -->
  <g class="node floating-delay">
    <rect class="card" x="310" y="325" width="170" height="130" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="310" y="325" width="170" height="36" rx="12" fill="#FFF7ED"/>
    <rect x="310" y="341" width="170" height="20" fill="#FFF7ED"/>
    <text x="395" y="349" font-size="14" font-weight="700" fill="#C2410C" text-anchor="middle">NAT Gateway</text>
    <text x="395" y="385" font-size="13" class="label" text-anchor="middle">Outbound Only</text>
    <text x="395" y="405" font-size="13" class="label" text-anchor="middle">Elastic IP Attached</text>
    <text x="395" y="435" font-size="12" font-weight="600" fill="#C2410C" text-anchor="middle">EIP: 3.x.x.x</text>
  </g>

  <!-- Private Instance -->
  <g class="node floating">
    <rect class="card" x="120" y="550" width="360" height="130" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="120" y="550" width="360" height="36" rx="12" fill="#FEF2F2"/>
    <rect x="120" y="566" width="360" height="20" fill="#FEF2F2"/>
    <text x="300" y="574" font-size="14" font-weight="700" fill="#B91C1C" text-anchor="middle">Private Instance</text>
    <text x="300" y="610" font-size="14" class="label" text-anchor="middle">Amazon Linux 2023 · t2.micro</text>
    <text x="300" y="635" font-size="13" font-weight="600" fill="#B91C1C" text-anchor="middle">No Public IP · 10.0.3.X</text>
    <text x="300" y="660" font-size="12" fill="#6B7280" text-anchor="middle">Internet access via NAT Gateway only</text>
  </g>

  <!-- Future Components in AZ B -->
  <g class="node">
    <rect class="card" x="620" y="340" width="360" height="100" rx="12" fill="#F8FAFC" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
    <text x="800" y="390" font-size="16" font-weight="700" fill="#6B7280" text-anchor="middle">Future: Application Load Balancer Node</text>
    <text x="800" y="415" font-size="12" font-weight="500" fill="#9CA3AF" text-anchor="middle">Project 10 — Auto Scaling + ALB</text>
  </g>

  <g class="node">
    <rect class="card" x="620" y="565" width="360" height="100" rx="12" fill="#F8FAFC" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
    <text x="800" y="615" font-size="16" font-weight="700" fill="#6B7280" text-anchor="middle">Future: RDS Multi-AZ Standby</text>
    <text x="800" y="640" font-size="12" font-weight="500" fill="#9CA3AF" text-anchor="middle">Project 6 — RDS + EC2</text>
  </g>
</svg>