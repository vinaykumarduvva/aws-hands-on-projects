<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lambdaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC7211;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B46C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#553C9A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E6B3A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9900"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B46C1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E8B57"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#1a1a2e" rx="10"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="white" font-size="24" font-weight="bold">Serverless REST API Architecture</text>
  <text x="450" y="65" text-anchor="middle" fill="#999" font-size="14">Lambda + API Gateway + DynamoDB</text>

  <!-- Client -->
  <rect x="50" y="100" width="120" height="60" rx="10" fill="#2d2d44" stroke="#FF9900" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="125" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🌐 Client</text>
  <text x="110" y="145" text-anchor="middle" fill="#999" font-size="11">Browser / curl</text>

  <!-- Internet Cloud -->
  <ellipse cx="300" cy="130" rx="60" ry="30" fill="none" stroke="#6B46C1" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="300" y="135" text-anchor="middle" fill="#6B46C1" font-size="12">HTTPS</text>

  <!-- API Gateway -->
  <rect x="400" y="100" width="200" height="100" rx="10" fill="url(#apiGrad)" filter="url(#shadow)"/>
  <text x="500" y="130" text-anchor="middle" fill="white" font-size="16" font-weight="bold">API Gateway</text>
  <text x="500" y="150" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">REST API (Regional)</text>
  <text x="500" y="170" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">users-api (prod stage)</text>
  
  <!-- API Routes inside Gateway -->
  <rect x="420" y="180" width="160" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="500" y="191" text-anchor="middle" fill="white" font-size="9">POST/GET /users | GET/PUT/DELETE /users/{id}</text>

  <!-- Lambda Function -->
  <rect x="400" y="280" width="200" height="100" rx="10" fill="url(#lambdaGrad)" filter="url(#shadow)"/>
  <text x="500" y="310" text-anchor="middle" fill="white" font-size="16" font-weight="bold">⚡ AWS Lambda</text>
  <text x="500" y="330" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">Python 3.12</text>
  <text x="500" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">users-api | 128MB | 30s</text>
  <rect x="420" y="360" width="160" height="15" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="500" y="371" text-anchor="middle" fill="white" font-size="9">5 CRUD Operations</text>

  <!-- DynamoDB -->
  <rect x="400" y="460" width="200" height="80" rx="10" fill="url(#dbGrad)" filter="url(#shadow)"/>
  <text x="500" y="490" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🗄️ DynamoDB</text>
  <text x="500" y="510" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">users Table</text>
  <text x="500" y="528" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">PK: userId | On-demand</text>

  <!-- IAM Role -->
  <rect x="700" y="340" width="160" height="80" rx="10" fill="#2d2d44" stroke="#FF9900" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="365" text-anchor="middle" fill="#FF9900" font-size="14" font-weight="bold">🔑 IAM Role</text>
  <text x="780" y="385" text-anchor="middle" fill="#999" font-size="10">lambda-users-api-role</text>
  <text x="780" y="405" text-anchor="middle" fill="#666" font-size="9">DynamoDB + CloudWatch</text>

  <!-- CloudWatch -->
  <rect x="50" y="460" width="160" height="60" rx="10" fill="#2d2d44" stroke="#6B46C1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="485" text-anchor="middle" fill="#6B46C1" font-size="14" font-weight="bold">📊 CloudWatch</text>
  <text x="130" y="505" text-anchor="middle" fill="#999" font-size="10">Logs + Metrics</text>

  <!-- Arrows -->
  <!-- Client to API Gateway -->
  <line x1="170" y1="130" x2="395" y2="130" stroke="#6B46C1" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <!-- API Gateway to Lambda -->
  <line x1="500" y1="200" x2="500" y2="275" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="520" y="245" fill="#FF9900" font-size="9">Invoke</text>

  <!-- Lambda to DynamoDB -->
  <line x1="500" y1="380" x2="500" y2="455" stroke="#2E8B57" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="520" y="425" fill="#2E8B57" font-size="9">CRUD Ops</text>

  <!-- Lambda to CloudWatch -->
  <line x1="400" y1="330" x2="215" y2="490" stroke="#6B46C1" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="280" y="420" fill="#6B46C1" font-size="9" transform="rotate(-45, 280, 420)">Logs</text>

  <!-- IAM to Lambda -->
  <line x1="700" y1="370" x2="605" y2="330" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- IAM to DynamoDB -->
  <line x1="700" y1="400" x2="605" y2="500" stroke="#2E8B57" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="50" y="540" width="800" height="45" rx="8" fill="#2d2d44" opacity="0.8"/>
  <text x="70" y="560" fill="#6B46C1" font-size="10">HTTPS</text>
  <text x="130" y="560" fill="#FF9900" font-size="10">Invocation</text>
  <text x="210" y="560" fill="#2E8B57" font-size="10">Data Access</text>
  <text x="300" y="560" fill="#999" font-size="10">- - - Permissions/Logs</text>
  <text x="470" y="560" fill="white" font-size="10">Free Tier: Lambda (1M req/mo) | API Gateway (1M calls) | DynamoDB (25GB)</text>
</svg>