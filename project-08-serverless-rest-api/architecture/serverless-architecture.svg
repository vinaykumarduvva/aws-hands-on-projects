<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Component Gradients -->
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C4FFF"/>
      <stop offset="100%" stop-color="#6B2ED5"/>
    </linearGradient>

    <linearGradient id="lambdaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>

    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#8C4FFF" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#EA580C" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#10B981" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -20; } }
    .flow-line { stroke-dasharray: 6 6; animation: dash 1.5s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 8 — Serverless REST API Architecture</text>
  <text x="550" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">Lambda + API Gateway + DynamoDB (Fully Managed &amp; Serverless)</text>

  <!-- AWS Cloud Boundary -->
  <rect x="50" y="200" width="1000" height="520" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="70" y="185" width="130" height="30" fill="#F8FAFC"/>
  <text x="80" y="207" font-size="20" font-weight="700" fill="#F58536">AWS Cloud</text>


  <!-- Flow Lines -->
  
  <!-- Client to API Gateway -->
  <path d="M 550 140 L 550 240" fill="none" stroke="#8C4FFF" stroke-width="3" marker-end="url(#arrow-purple)" class="flow-line"/>
  <rect x="490" y="170" width="120" height="20" rx="10" fill="#F3E8FF"/>
  <text x="550" y="184" font-size="11" font-weight="700" fill="#6D28D9" text-anchor="middle">HTTPS Requests</text>

  <!-- API Gateway to Lambda -->
  <path d="M 550 380 L 550 440" fill="none" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow-orange)" class="flow-line"/>
  <rect x="490" y="400" width="120" height="20" rx="10" fill="#FFEDD5"/>
  <text x="550" y="414" font-size="11" font-weight="700" fill="#C2410C" text-anchor="middle">Triggers Event</text>

  <!-- Lambda to DynamoDB -->
  <path d="M 550 560 L 550 600" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>
  <rect x="490" y="570" width="120" height="20" rx="10" fill="#D1FAE5"/>
  <text x="550" y="584" font-size="11" font-weight="700" fill="#047857" text-anchor="middle">CRUD Operations</text>


  <!-- Nodes -->

  <!-- Client -->
  <g class="node">
    <rect class="card" x="430" y="80" width="240" height="60" rx="30" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="465" cy="110" r="14" fill="#F3F4F6"/>
    <text x="550" y="115" font-size="18" font-weight="700" fill="#374151" text-anchor="middle">Client (Browser / Curl)</text>
  </g>


  <!-- API Gateway -->
  <g class="node floating">
    <rect class="card" x="350" y="250" width="400" height="130" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="350" y="250" width="400" height="40" rx="12" fill="url(#apiGrad)"/>
    <text x="550" y="275" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Amazon API Gateway</text>

    <text x="550" y="315" font-size="16" class="title" text-anchor="middle">REST API (Regional)</text>
    <text x="550" y="335" font-size="13" class="label" text-anchor="middle">Stage: prod · API Name: users-api</text>
    
    <rect x="380" y="345" width="340" height="20" rx="4" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
    <text x="550" y="358" font-size="11" font-weight="600" fill="#6D28D9" text-anchor="middle">POST/GET /users | GET/PUT/DELETE /users/{id}</text>
  </g>


  <!-- AWS Lambda -->
  <g class="node floating-delay">
    <rect class="card" x="350" y="440" width="400" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="350" y="440" width="400" height="40" rx="12" fill="url(#lambdaGrad)"/>
    <text x="550" y="465" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">AWS Lambda</text>

    <text x="550" y="505" font-size="16" class="title" text-anchor="middle">Compute Function</text>
    <text x="550" y="525" font-size="13" class="label" text-anchor="middle">users-api · Python 3.12 · 128MB Memory · 30s Timeout</text>
    <text x="550" y="545" font-size="13" class="label" text-anchor="middle">Executes CRUD logic autonomously</text>
  </g>

  <!-- Amazon DynamoDB -->
  <g class="node floating">
    <rect class="card" x="350" y="600" width="400" height="100" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="350" y="600" width="400" height="40" rx="12" fill="url(#dbGrad)"/>
    <text x="550" y="625" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Amazon DynamoDB</text>

    <text x="550" y="665" font-size="16" class="title" text-anchor="middle">NoSQL Database</text>
    <text x="550" y="685" font-size="13" class="label" text-anchor="middle">Table: users · PK: userId · On-Demand Capacity</text>
  </g>


  <!-- Supporting Services (Right Side) -->
  
  <!-- IAM Role -->
  <g class="node">
    <rect class="card" x="800" y="380" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="800" y="380" width="220" height="30" rx="12" fill="#F3F4F6"/>
    <rect x="800" y="395" width="220" height="15" fill="#F3F4F6"/>
    <text x="910" y="400" font-size="13" font-weight="700" fill="#4B5563" text-anchor="middle">IAM Execution Role</text>
    
    <text x="910" y="435" font-size="13" class="title" text-anchor="middle">lambda-users-api-role</text>
    <text x="910" y="455" font-size="11" class="label" text-anchor="middle">Grants access to DynamoDB &amp; CW</text>
  </g>

  <path d="M 750 430 L 800 430" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- CloudWatch -->
  <g class="node">
    <rect class="card" x="800" y="520" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="800" y="520" width="220" height="30" rx="12" fill="#FCE7F3"/>
    <rect x="800" y="535" width="220" height="15" fill="#FCE7F3"/>
    <text x="910" y="540" font-size="13" font-weight="700" fill="#DB2777" text-anchor="middle">CloudWatch</text>
    
    <text x="910" y="575" font-size="13" class="title" text-anchor="middle">Logs &amp; Metrics</text>
    <text x="910" y="595" font-size="11" class="label" text-anchor="middle">Captures execution logs</text>
  </g>

  <path d="M 750 560 L 800 560" fill="none" stroke="#DB2777" stroke-width="2" stroke-dasharray="4,4"/>

</svg>