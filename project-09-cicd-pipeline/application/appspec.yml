version: 0.0
os: linux

files:
  - source: /index.html
    destination: /var/www/html/
  - source: /build-info.txt
    destination: /var/www/html/

permissions:
  - object: /var/www/html/
    pattern: "**"
    owner: apache
    group: apache
    mode: 644
    type:
      - file

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root