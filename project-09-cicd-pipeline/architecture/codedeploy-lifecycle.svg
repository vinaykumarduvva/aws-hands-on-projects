<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, Helvetica, sans-serif">
  <defs>

  <style>
    :root {
      --bg: #0a0a1a;
      --bg-gradient-start: #0a0a1a;
      --bg-gradient-end: #1a1a2e;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --box-bg: #1a1a3a;
      --box-bg-light: #2a2a4a;
      --orange: #FF9900;
      --blue: #1a73e8;
      --green: #2E8B57;
      --red: #cc3333;
      --purple: #9B59B6;
      --grid: #ffffff08;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --bg-gradient-start: #f8fafc;
        --bg-gradient-end: #e2e8f0;
        --text-main: #0f172a;
        --text-muted: #475569;
        --box-bg: #ffffff;
        --box-bg-light: #f1f5f9;
        --orange: #e68a00;
        --blue: #1557b0;
        --green: #1f6b42;
        --red: #b32424;
        --purple: #7a4694;
        --grid: #00000008;
      }
    }
    svg {
      background-color: var(--bg);
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
    }
    text {
      transition: fill 0.3s ease;
    }
    .text-title { fill: var(--orange); font-weight: 800; }
    .text-main { fill: var(--text-main); }
    .text-muted { fill: var(--text-muted); }
    .box-bg { fill: var(--box-bg); transition: fill 0.3s ease, stroke 0.3s ease; }
    .float { animation: float 6s ease-in-out infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 2s forwards; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    @keyframes pulse {
      0% { opacity: 0.8; }
      50% { opacity: 1; filter: brightness(1.2); }
      100% { opacity: 0.8; }
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
  </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--bg-gradient-start)"/>
      <stop offset="100%" stop-color="var(--bg-gradient-end)"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E8B57"/>
      <stop offset="100%" style="stop-color:#3CB371"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bg)" class="box-bg"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="var(--green)" font-size="22" font-weight="bold" filter="url(#shadow)">
    CodeDeploy Lifecycle — Deployment Events
  </text>
  <text x="500" y="58" text-anchor="middle" fill="var(--text-muted)" font-size="12">Complete lifecycle of a CodeDeploy deployment to EC2</text>

  <!-- ===== LIFECYCLE FLOW (Horizontal) ===== -->

  <!-- Phase 0: Start -->
  <rect x="50" y="120" width="120" height="80" rx="10" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="152" text-anchor="middle" fill="var(--orange)" font-size="13" font-weight="bold">⏳ Created</text>
  <text x="110" y="172" text-anchor="middle" fill="var(--text-muted)" font-size="10">Deployment</text>
  <text x="110" y="190" text-anchor="middle" fill="var(--text-muted)" font-size="10">Initiated</text>

  <line x1="170" y1="160" x2="210" y2="160" stroke="var(--orange)" stroke-width="2" marker-end="url(#arrow)" class="draw"/> <set attributeName="class" to="draw" />

  <!-- Phase 1: BeforeInstall -->
  <rect x="220" y="100" width="150" height="120" rx="10" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="220" y="100" width="150" height="30" rx="10" fill="var(--orange)" opacity="0.9"/>
  <rect x="220" y="120" width="150" height="10" fill="var(--orange)" opacity="0.9"/>
  <text x="295" y="121" text-anchor="middle" fill="var(--text-main)" font-size="12" font-weight="bold"><tspan class="float">🔧 BeforeInstall</tspan></text>
  <text x="295" y="148" text-anchor="middle" fill="var(--text-muted)" font-size="10">Stop Apache</text>
  <text x="295" y="165" text-anchor="middle" fill="var(--text-muted)" font-size="10">Install Apache</text>
  <text x="295" y="182" text-anchor="middle" fill="var(--text-muted)" font-size="10">Clean old files</text>
  <text x="295" y="199" text-anchor="middle" fill="var(--text-muted)" font-size="9">Timeout: 60s</text>
  <text x="295" y="214" text-anchor="middle" fill="var(--text-muted)" font-size="9">Runas: root</text>

  <line x1="370" y1="160" x2="410" y2="160" stroke="var(--orange)" stroke-width="2" marker-end="url(#arrow)" class="draw"/> <set attributeName="class" to="draw" />

  <!-- Phase 2: ApplicationStop (skipped on first deploy) -->
  <rect x="420" y="130" width="130" height="60" rx="10" fill="var(--box-bg)" stroke="#666" stroke-width="1" stroke-dasharray="4,3" filter="url(#shadow)"/>
  <text x="485" y="155" text-anchor="middle" fill="#666" font-size="12" font-weight="bold"><tspan class="float">🛑 ApplicationStop</tspan></text>
  <text x="485" y="175" text-anchor="middle" fill="#555" font-size="10">(Skipped — first deploy)</text>

  <line x1="550" y1="160" x2="590" y2="160" stroke="var(--orange)" stroke-width="2" marker-end="url(#arrow)" class="draw"/> <set attributeName="class" to="draw" />

  <!-- Phase 3: DownloadBundle -->
  <rect x="600" y="100" width="150" height="120" rx="10" fill="var(--box-bg)" stroke="var(--blue)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="100" width="150" height="30" rx="10" fill="var(--blue)" opacity="0.9"/>
  <rect x="600" y="120" width="150" height="10" fill="var(--blue)" opacity="0.9"/>
  <text x="675" y="121" text-anchor="middle" fill="var(--text-main)" font-size="12" font-weight="bold"><tspan class="float">📥 DownloadBundle</tspan></text>
  <text x="675" y="148" text-anchor="middle" fill="var(--text-muted)" font-size="10">Fetch artifact</text>
  <text x="675" y="165" text-anchor="middle" fill="var(--text-muted)" font-size="10">from S3 bucket</text>
  <text x="675" y="182" text-anchor="middle" fill="var(--text-muted)" font-size="10">Extract ZIP</text>
  <text x="675" y="199" text-anchor="middle" fill="var(--text-muted)" font-size="9">Source: BuildOutput</text>
  <text x="675" y="214" text-anchor="middle" fill="var(--text-muted)" font-size="9">→ /opt/codedeploy-agent</text>

  <line x1="750" y1="160" x2="790" y2="160" stroke="var(--blue)" stroke-width="2" marker-end="url(#arrow)" class="draw"/> <set attributeName="class" to="draw" />

  <!-- Phase 4: AfterInstall -->
  <rect x="800" y="100" width="150" height="120" rx="10" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="800" y="100" width="150" height="30" rx="10" fill="var(--orange)" opacity="0.9"/>
  <rect x="800" y="120" width="150" height="10" fill="var(--orange)" opacity="0.9"/>
  <text x="875" y="121" text-anchor="middle" fill="var(--text-main)" font-size="12" font-weight="bold"><tspan class="float">📋 AfterInstall</tspan></text>
  <text x="875" y="148" text-anchor="middle" fill="var(--text-muted)" font-size="10">Set permissions</text>
  <text x="875" y="165" text-anchor="middle" fill="var(--text-muted)" font-size="10">chown apache</text>
  <text x="875" y="182" text-anchor="middle" fill="var(--text-muted)" font-size="10">chmod 644</text>
  <text x="875" y="199" text-anchor="middle" fill="var(--text-muted)" font-size="9">Timeout: 60s</text>
  <text x="875" y="214" text-anchor="middle" fill="var(--text-muted)" font-size="9">Runas: root</text>

  <!-- Arrow down from AfterInstall -->
  <line x1="875" y1="220" x2="875" y2="280" stroke="var(--orange)" stroke-width="2" marker-end="url(#arrow)" class="draw"/> <set attributeName="class" to="draw" />

  <!-- Phase 5: ApplicationStart -->
  <rect x="800" y="290" width="150" height="120" rx="10" fill="var(--box-bg)" stroke="var(--green)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="800" y="290" width="150" height="30" rx="10" fill="var(--green)" opacity="0.9"/>
  <rect x="800" y="310" width="150" height="10" fill="var(--green)" opacity="0.9"/>
  <text x="875" y="311" text-anchor="middle" fill="var(--text-main)" font-size="12" font-weight="bold"><tspan class="float">▶️ ApplicationStart</tspan></text>
  <text x="875" y="338" text-anchor="middle" fill="var(--text-muted)" font-size="10">systemctl start</text>
  <text x="875" y="355" text-anchor="middle" fill="var(--text-muted)" font-size="10">systemctl enable</text>
  <text x="875" y="372" text-anchor="middle" fill="var(--text-muted)" font-size="10">Apache web server</text>
  <text x="875" y="389" text-anchor="middle" fill="var(--text-muted)" font-size="9">Timeout: 60s</text>
  <text x="875" y="404" text-anchor="middle" fill="var(--text-muted)" font-size="9">Runas: root</text>

  <!-- Arrow left from ApplicationStart -->
  <line x1="800" y1="350" x2="720" y2="350" stroke="var(--green)" stroke-width="2" marker-end="url(#arrow)" class="draw"/> <set attributeName="class" to="draw" />

  <!-- Phase 6: ValidateService -->
  <rect x="570" y="290" width="150" height="120" rx="10" fill="var(--box-bg)" stroke="var(--green)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="570" y="290" width="150" height="30" rx="10" fill="var(--green)" opacity="0.9"/>
  <rect x="570" y="310" width="150" height="10" fill="var(--green)" opacity="0.9"/>
  <text x="645" y="311" text-anchor="middle" fill="var(--text-main)" font-size="12" font-weight="bold"><tspan class="float">✅ ValidateService</tspan></text>
  <text x="645" y="338" text-anchor="middle" fill="var(--text-muted)" font-size="10">Wait 3 seconds</text>
  <text x="645" y="355" text-anchor="middle" fill="var(--text-muted)" font-size="10">Check systemctl</text>
  <text x="645" y="372" text-anchor="middle" fill="var(--text-muted)" font-size="10">curl localhost</text>
  <text x="645" y="389" text-anchor="middle" fill="var(--text-muted)" font-size="9">Expect HTTP 200</text>
  <text x="645" y="404" text-anchor="middle" fill="var(--text-muted)" font-size="9">Timeout: 60s</text>

  <!-- Arrow from ValidateService to Complete -->
  <line x1="570" y1="350" x2="490" y2="350" stroke="var(--green)" stroke-width="2" marker-end="url(#arrow)" class="draw"/> <set attributeName="class" to="draw" />

  <!-- Phase 7: Complete -->
  <rect x="340" y="290" width="150" height="120" rx="10" fill="var(--box-bg)" stroke="var(--green)" stroke-width="3" filter="url(#shadow)"/>
  <rect x="340" y="290" width="150" height="30" rx="10" fill="url(#greenGrad)" opacity="0.9"/>
  <rect x="340" y="310" width="150" height="10" fill="url(#greenGrad)" opacity="0.9"/>
  <text x="415" y="311" text-anchor="middle" fill="var(--text-main)" font-size="12" font-weight="bold"><tspan class="float">🏆 Succeeded</tspan></text>
  <text x="415" y="338" text-anchor="middle" fill="var(--green)" font-size="10">All hooks passed</text>
  <text x="415" y="355" text-anchor="middle" fill="var(--green)" font-size="10">App is live</text>
  <text x="415" y="372" text-anchor="middle" fill="var(--green)" font-size="10">HTTP 200</text>
  <text x="415" y="389" text-anchor="middle" fill="var(--text-muted)" font-size="9">Auto-rollback</text>
  <text x="415" y="404" text-anchor="middle" fill="var(--text-muted)" font-size="9">on failure</text>

  <!-- ===== FAILURE PATH ===== -->
  <rect x="50" y="440" width="900" height="120" rx="10" fill="#1a0a0a" stroke="var(--red)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="440" width="900" height="28" rx="10" fill="var(--red)" opacity="0.2"/>
  <text x="500" y="460" text-anchor="middle" fill="var(--red)" font-size="14" font-weight="bold"><tspan class="float">❌ Failure Handling — Auto Rollback</tspan></text>
  <text x="500" y="490" text-anchor="middle" fill="var(--text-muted)" font-size="11">If any hook fails (non-zero exit code or timeout):</text>
  <text x="500" y="512" text-anchor="middle" fill="var(--text-muted)" font-size="11">1. Deployment status changes to Failed  →  2. Auto-rollback triggers if enabled</text>
  <text x="500" y="534" text-anchor="middle" fill="var(--text-muted)" font-size="11">3. Previous successful revision is re-deployed  →  4. EC2 returns to last known good state</text>
  <text x="500" y="554" text-anchor="middle" fill="var(--text-muted)" font-size="10">Rollback Config: CodeDeployDefault.AllAtOnce  •  Events: DEPLOYMENT_FAILURE</text>

  <!-- ===== STATUS LIFECYCLE (Bottom) ===== -->
  <rect x="50" y="585" width="900" height="95" rx="10" fill="var(--box-bg)" stroke="#333" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="610" text-anchor="middle" fill="var(--orange)" font-size="13" font-weight="bold">Deployment Status Lifecycle</text>

  <!-- Status pills -->
  <rect x="80" y="630" width="100" height="28" rx="14" fill="var(--blue)" opacity="0.3" stroke="var(--blue)" stroke-width="1"/>
  <text x="130" y="649" text-anchor="middle" fill="var(--blue)" font-size="11">Created</text>

  <text x="200" y="649" fill="var(--text-muted)" font-size="14">→</text>

  <rect x="220" y="630" width="100" height="28" rx="14" fill="var(--orange)" opacity="0.3" stroke="var(--orange)" stroke-width="1"/>
  <text x="270" y="649" text-anchor="middle" fill="var(--orange)" font-size="11">InProgress</text>

  <text x="340" y="649" fill="var(--text-muted)" font-size="14">→</text>

  <rect x="360" y="630" width="100" height="28" rx="14" fill="var(--green)" opacity="0.3" stroke="var(--green)" stroke-width="1"/>
  <text x="410" y="649" text-anchor="middle" fill="var(--green)" font-size="11">Succeeded</text>

  <text x="480" y="649" fill="var(--text-muted)" font-size="12">or</text>

  <rect x="510" y="630" width="80" height="28" rx="14" fill="var(--red)" opacity="0.3" stroke="var(--red)" stroke-width="1"/>
  <text x="550" y="649" text-anchor="middle" fill="var(--red)" font-size="11">Failed</text>

  <text x="610" y="649" fill="var(--text-muted)" font-size="14">→</text>

  <rect x="630" y="630" width="80" height="28" rx="14" fill="var(--red)" opacity="0.2" stroke="var(--red)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="670" y="649" text-anchor="middle" fill="var(--red)" font-size="10">Rollback</text>

  <text x="730" y="649" fill="var(--text-muted)" font-size="14">→</text>

  <rect x="750" y="630" width="80" height="28" rx="14" fill="var(--green)" opacity="0.3" stroke="var(--green)" stroke-width="1"/>
  <text x="790" y="649" text-anchor="middle" fill="var(--green)" font-size="11">Restored</text>

  <!-- All-at-once indicator -->
  <rect x="730" y="605" width="100" height="18" rx="4" fill="var(--blue)" opacity="0.2"/>
  <text x="780" y="618" text-anchor="middle" fill="var(--blue)" font-size="8">AllAtOnce Config</text>
</svg>