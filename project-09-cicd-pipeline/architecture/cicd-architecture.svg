<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Colors -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0073BB"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C4FFF"/>
      <stop offset="100%" stop-color="#6B2ED5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Shadows & Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#8C4FFF" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#10B981" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#F58536" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -40; } }
    .flow-line { stroke-dasharray: 8 8; animation: dash 2s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="600" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 9 — CI/CD Pipeline Architecture</text>
  <text x="600" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">Fully Automated Deployment Pipeline using AWS Developer Tools</text>

  <!-- AWS Cloud Boundary -->
  <rect x="50" y="100" width="1100" height="660" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="70" y="85" width="220" height="30" fill="#F8FAFC"/>
  <text x="80" y="107" font-size="20" font-weight="700" fill="#F58536">AWS Cloud</text>


  <!-- Developer -->
  <g class="node">
    <rect class="card" x="80" y="240" width="160" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="80" y="240" width="160" height="36" rx="12" fill="#F3F4F6"/>
    <rect x="80" y="256" width="160" height="20" fill="#F3F4F6"/>
    <text x="160" y="264" font-size="14" font-weight="700" fill="#374151" text-anchor="middle">Developer</text>
    
    <text x="160" y="305" font-size="13" class="title" text-anchor="middle">Local Machine</text>
    <text x="160" y="325" font-size="11" class="label" text-anchor="middle">git push origin main</text>
  </g>

  <!-- Developer to CodeCommit -->
  <path d="M 240 300 L 320 300" fill="none" stroke="#F58536" stroke-width="3" marker-end="url(#arrow-orange)" class="flow-line"/>

  <!-- CodeCommit -->
  <g class="node floating">
    <rect class="card" x="320" y="240" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#FCE7F3" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="320" y="240" width="180" height="36" rx="12" fill="url(#orangeGrad)"/>
    <rect x="320" y="256" width="180" height="20" fill="url(#orangeGrad)"/>
    <text x="410" y="264" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">AWS CodeCommit</text>
    
    <text x="410" y="305" font-size="13" class="title" text-anchor="middle">Git Repository</text>
    <text x="410" y="325" font-size="11" class="label" text-anchor="middle">my-web-app (main)</text>
  </g>


  <!-- Pipeline Boundary -->
  <rect x="540" y="140" width="380" height="500" rx="16" fill="#FDF2F8" stroke="#DB2777" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="560" y="125" width="220" height="30" fill="#F8FAFC"/>
  <text x="570" y="147" font-size="16" font-weight="700" fill="#DB2777">AWS CodePipeline</text>


  <!-- Stage 1 -->
  <g class="node floating">
    <rect class="card" x="570" y="170" width="320" height="80" rx="12" fill="#FFFFFF" stroke="#DB2777" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="570" y="170" width="90" height="80" rx="12" fill="#DB2777"/>
    <rect x="650" y="170" width="10" height="80" fill="#DB2777"/>
    <text x="615" y="215" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Source</text>
    
    <text x="790" y="205" font-size="13" class="title" text-anchor="middle">CodeCommit Source</text>
    <text x="790" y="225" font-size="11" class="label" text-anchor="middle">Triggered via CloudWatch Event</text>
  </g>

  <!-- Connect CodeCommit to Source Stage -->
  <path d="M 500 300 L 520 300 L 520 210 L 570 210" fill="none" stroke="#DB2777" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow-purple)"/>


  <!-- Flow 1 to 2 -->
  <path d="M 730 250 L 730 330" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <rect x="660" y="280" width="140" height="20" rx="10" fill="#E0F2FE"/>
  <text x="730" y="294" font-size="10" font-weight="700" fill="#0073BB" text-anchor="middle">Pass SourceArtifact</text>

  <!-- Stage 2 -->
  <g class="node floating-delay">
    <rect class="card" x="570" y="330" width="320" height="120" rx="12" fill="#FFFFFF" stroke="#0073BB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="570" y="330" width="90" height="120" rx="12" fill="url(#blueGrad)"/>
    <rect x="650" y="330" width="10" height="120" fill="url(#blueGrad)"/>
    <text x="615" y="395" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Build</text>
    
    <text x="790" y="365" font-size="14" class="title" text-anchor="middle">AWS CodeBuild</text>
    <text x="790" y="390" font-size="11" class="label" text-anchor="middle">Uses buildspec.yml</text>
    <text x="790" y="410" font-size="11" class="label" text-anchor="middle">install → build → post_build</text>
    <text x="790" y="430" font-size="11" class="label" text-anchor="middle">Creates BuildArtifact (ZIP)</text>
  </g>


  <!-- Flow 2 to 3 -->
  <path d="M 730 450 L 730 530" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>
  <rect x="660" y="480" width="140" height="20" rx="10" fill="#D1FAE5"/>
  <text x="730" y="494" font-size="10" font-weight="700" fill="#047857" text-anchor="middle">Pass BuildArtifact</text>

  <!-- Stage 3 -->
  <g class="node floating">
    <rect class="card" x="570" y="530" width="320" height="80" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="570" y="530" width="90" height="80" rx="12" fill="url(#greenGrad)"/>
    <rect x="650" y="530" width="10" height="80" fill="url(#greenGrad)"/>
    <text x="615" y="575" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Deploy</text>
    
    <text x="790" y="565" font-size="14" class="title" text-anchor="middle">AWS CodeDeploy</text>
    <text x="790" y="585" font-size="11" class="label" text-anchor="middle">Uses appspec.yml</text>
  </g>


  <!-- Deploy to EC2 -->
  <path d="M 890 570 L 980 570" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>


  <!-- EC2 Server -->
  <g class="node">
    <rect class="card" x="980" y="490" width="140" height="150" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="980" y="490" width="140" height="30" rx="12" fill="#D1FAE5"/>
    <rect x="980" y="505" width="140" height="15" fill="#D1FAE5"/>
    <text x="1050" y="510" font-size="13" font-weight="700" fill="#047857" text-anchor="middle">EC2 Server</text>
    
    <text x="1050" y="550" font-size="12" class="title" text-anchor="middle">Target Env</text>
    <text x="1050" y="570" font-size="11" class="label" text-anchor="middle">Tag: Env=prod</text>
    <text x="1050" y="590" font-size="11" class="label" text-anchor="middle">Apache Installed</text>
    <text x="1050" y="610" font-size="11" class="label" text-anchor="middle">Agent Running</text>
  </g>

  
  <!-- S3 Artifact Bucket -->
  <g class="node">
    <rect class="card" x="320" y="490" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#F58536" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="320" y="490" width="180" height="36" rx="12" fill="#FFEDD5"/>
    <rect x="320" y="506" width="180" height="20" fill="#FFEDD5"/>
    <text x="410" y="514" font-size="14" font-weight="700" fill="#C2410C" text-anchor="middle">Amazon S3</text>
    
    <text x="410" y="555" font-size="13" class="title" text-anchor="middle">Artifact Bucket</text>
    <text x="410" y="575" font-size="11" class="label" text-anchor="middle">codepipeline-artifacts</text>
    <text x="410" y="595" font-size="10" fill="#9CA3AF" text-anchor="middle">Stores Source &amp; Build ZIPs</text>
  </g>

  <!-- Pipeline connects to S3 -->
  <path d="M 570 390 L 500 390 L 500 490" fill="none" stroke="#F58536" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-orange)"/>


  <!-- IAM Service Roles -->
  <rect x="180" y="650" width="800" height="60" rx="12" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="580" y="685" font-size="14" font-weight="700" fill="#4B5563" text-anchor="middle">IAM Roles used: codepipeline-service-role · codebuild-service-role · codedeploy-service-role · ec2-codedeploy-role</text>

</svg>