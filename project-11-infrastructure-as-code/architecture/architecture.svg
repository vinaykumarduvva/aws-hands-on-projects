<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Colors -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4F8B"/>
      <stop offset="100%" stop-color="#D93068"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#FF4F8B" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#3B82F6" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -20; } }
    .flow-line { stroke-dasharray: 6 6; animation: dash 1.5s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 11 — Infrastructure as Code Architecture</text>
  <text x="550" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">AWS CloudFormation with Nested Stacks (Root, Network, Compute, Database)</text>

  <!-- Developer / Cloud Engineer -->
  <g class="node">
    <rect class="card" x="50" y="250" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="50" y="250" width="220" height="30" rx="12" fill="url(#blueGrad)"/>
    <rect x="50" y="265" width="220" height="15" fill="url(#blueGrad)"/>
    <text x="160" y="270" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">👨‍💻 Cloud Engineer</text>
    
    <text x="160" y="310" font-size="14" class="title" text-anchor="middle">AWS CLI / IDE</text>
    <text x="160" y="330" font-size="11" class="label" text-anchor="middle">Writes YAML / runs cfn-lint</text>
  </g>

  <!-- Flow User to CF -->
  <path d="M 270 300 L 370 300" fill="none" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <rect x="295" y="275" width="50" height="20" rx="10" fill="#DBEAFE"/>
  <text x="320" y="289" font-size="11" font-weight="700" fill="#1D4ED8" text-anchor="middle">Deploy</text>

  <!-- CloudFormation Service -->
  <g class="node floating">
    <rect class="card" x="370" y="160" width="260" height="280" rx="12" fill="#FFFFFF" stroke="#FF4F8B" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="370" y="160" width="260" height="40" rx="12" fill="url(#pinkGrad)"/>
    <text x="500" y="185" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">AWS CloudFormation</text>
    
    <text x="500" y="230" font-size="15" class="title" text-anchor="middle">Root Stack</text>
    
    <rect x="400" y="250" width="200" height="40" rx="6" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
    <text x="500" y="275" font-size="12" font-weight="600" fill="#BE185D" text-anchor="middle">📦 Network Stack (VPC)</text>

    <rect x="400" y="310" width="200" height="40" rx="6" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
    <text x="500" y="335" font-size="12" font-weight="600" fill="#BE185D" text-anchor="middle">📦 Compute Stack (EC2, ALB)</text>

    <rect x="400" y="370" width="200" height="40" rx="6" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
    <text x="500" y="395" font-size="12" font-weight="600" fill="#BE185D" text-anchor="middle">📦 Database Stack (RDS)</text>
  </g>

  <!-- CF Flow Lines to Resources -->
  <!-- To Network -->
  <path d="M 600 270 L 730 270" fill="none" stroke="#FF4F8B" stroke-width="3" marker-end="url(#arrow-pink)" class="flow-line"/>
  
  <!-- To Compute -->
  <path d="M 600 330 L 730 330" fill="none" stroke="#FF4F8B" stroke-width="3" marker-end="url(#arrow-pink)" class="flow-line"/>
  
  <!-- To DB -->
  <path d="M 600 390 L 730 390" fill="none" stroke="#FF4F8B" stroke-width="3" marker-end="url(#arrow-pink)" class="flow-line"/>


  <!-- Provisioned Infrastructure Boundary -->
  <rect x="710" y="140" width="340" height="460" rx="16" fill="#F0FDF4" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="730" y="125" width="220" height="30" fill="#F8FAFC"/>
  <text x="740" y="147" font-size="16" font-weight="700" fill="#047857">Provisioned VPC</text>

  <!-- Network Stack Resources (ALB) -->
  <g class="node floating-delay">
    <rect class="card" x="740" y="220" width="280" height="90" rx="12" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="740" y="220" width="60" height="90" rx="12" fill="url(#purpleGrad)"/>
    <rect x="790" y="220" width="10" height="90" fill="url(#purpleGrad)"/>
    <text x="770" y="265" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">LB</text>
    
    <text x="890" y="255" font-size="13" class="title" text-anchor="middle">Application Load Balancer</text>
    <text x="890" y="275" font-size="11" class="label" text-anchor="middle">Public Subnets / Cross-Zone</text>
  </g>

  <!-- Compute Stack Resources (ASG) -->
  <g class="node floating">
    <rect class="card" x="740" y="340" width="280" height="90" rx="12" fill="#FFFFFF" stroke="#F58536" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="740" y="340" width="60" height="90" rx="12" fill="url(#orangeGrad)"/>
    <rect x="790" y="340" width="10" height="90" fill="url(#orangeGrad)"/>
    <text x="770" y="385" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">AS</text>
    
    <text x="890" y="375" font-size="13" class="title" text-anchor="middle">Auto Scaling Group</text>
    <text x="890" y="395" font-size="11" class="label" text-anchor="middle">EC2 Instances from Template</text>
  </g>

  <!-- Database Stack Resources (RDS) -->
  <g class="node floating-delay">
    <rect class="card" x="740" y="460" width="280" height="90" rx="12" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="740" y="460" width="60" height="90" rx="12" fill="url(#blueGrad)"/>
    <rect x="790" y="460" width="10" height="90" fill="url(#blueGrad)"/>
    <text x="770" y="505" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">DB</text>
    
    <text x="890" y="495" font-size="13" class="title" text-anchor="middle">Amazon RDS</text>
    <text x="890" y="515" font-size="11" class="label" text-anchor="middle">Private Subnets / DB Group</text>
  </g>
</svg>