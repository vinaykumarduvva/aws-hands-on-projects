<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&amp;display=swap');
      :root {
        --bg-color: #f8fafc; 
        --text-color: #1e293b; 
        --card-bg: #ffffff;
        --card-border: #e2e8f0; 
        --line-color: #94a3b8;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0f172a; 
          --text-color: #f1f5f9; 
          --card-bg: #1e293b;
          --card-border: #334155; 
          --line-color: #475569;
        }
      }
      text { font-family: 'Outfit', sans-serif; fill: var(--text-color); }
      .bg { fill: var(--bg-color); }
      .card { fill: var(--card-bg); stroke: var(--card-border); stroke-width: 2px; rx: 12px; }
      .icon-box { rx: 8px; }
      
      /* Typography */
      .title { font-size: 28px; font-weight: 600; }
      .subtitle { font-size: 16px; font-weight: 300; opacity: 0.8; }
      .group-title { font-size: 20px; font-weight: 600; opacity: 0.9; }
      .card-title { font-size: 18px; font-weight: 600; }
      .card-desc { font-size: 14px; opacity: 0.8; }
      .label { font-size: 14px; font-weight: 600; fill: var(--line-color); }
      
      /* Animations */
      .line { stroke: var(--line-color); stroke-width: 2px; fill: none; stroke-dasharray: 6; animation: dash 15s linear infinite; }
      .arrow { fill: var(--line-color); }
      
      @keyframes dash { to { stroke-dashoffset: -400; } }
      
      @keyframes pulse-cf {
        0% { filter: drop-shadow(0 0 4px rgba(255, 79, 139, 0.2)); stroke: var(--card-border); }
        50% { filter: drop-shadow(0 0 12px rgba(255, 79, 139, 0.8)); stroke: #ff4f8b; }
        100% { filter: drop-shadow(0 0 4px rgba(255, 79, 139, 0.2)); stroke: var(--card-border); }
      }
      @keyframes pulse-blue {
        0% { filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.2)); stroke: var(--card-border); }
        50% { filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.6)); stroke: #3b82f6; }
        100% { filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.2)); stroke: var(--card-border); }
      }
      @keyframes pulse-green {
        0% { filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.2)); stroke: var(--card-border); }
        50% { filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.6)); stroke: #10b981; }
        100% { filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.2)); stroke: var(--card-border); }
      }
      
      .pulse-cf { animation: pulse-cf 3s infinite; }
      .pulse-blue { animation: pulse-blue 4s infinite; }
      .pulse-green { animation: pulse-green 3.5s infinite; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <rect class="bg" width="1000" height="650" />
  
  <text x="50" y="60" class="title">Project 11 Architecture</text>
  <text x="50" y="85" class="subtitle">Infrastructure as Code with AWS CloudFormation</text>

  <!-- AWS CloudFormation Service -->
  <g transform="translate(300, 250)">
    <rect x="0" y="0" width="240" height="150" class="card pulse-cf" />
    <rect x="20" y="20" width="40" height="40" fill="#FF4F8B" class="icon-box" />
    <text x="40" y="47" fill="white" font-size="20" font-weight="bold" text-anchor="middle">CF</text>
    <text x="75" y="40" class="card-title">AWS CloudFormation</text>
    <text x="75" y="60" class="card-desc">Root Stack</text>
    <text x="20" y="95" class="card-desc">→ Network Stack</text>
    <text x="20" y="115" class="card-desc">→ Compute Stack</text>
    <text x="20" y="135" class="card-desc">→ Database Stack</text>
  </g>

  <!-- User / Admin -->
  <g transform="translate(40, 275)">
    <rect x="0" y="0" width="200" height="100" class="card" />
    <rect x="20" y="30" width="40" height="40" fill="#3B82F6" class="icon-box" />
    <text x="40" y="57" fill="white" font-size="20" font-weight="bold" text-anchor="middle">&gt;_</text>
    <text x="75" y="45" class="card-title">Cloud Engineer</text>
    <text x="75" y="65" class="card-desc">AWS CLI / cfn-lint</text>
  </g>

  <!-- Provisioned Infrastructure Boundary (VPC) -->
  <rect x="620" y="140" width="340" height="460" class="card pulse-green" stroke-dasharray="8" fill-opacity="0.3" />
  <text x="640" y="180" class="group-title">Provisioned VPC</text>
  
  <!-- ALB (Compute Stack) -->
  <g transform="translate(640, 210)">
    <rect x="0" y="0" width="280" height="90" class="card" />
    <rect x="20" y="25" width="40" height="40" fill="#8B5CF6" class="icon-box" />
    <text x="40" y="52" fill="white" font-size="20" font-weight="bold" text-anchor="middle">LB</text>
    <text x="75" y="45" class="card-title">Application Load Balancer</text>
    <text x="75" y="65" class="card-desc">Public Subnets / Cross-Zone</text>
  </g>

  <!-- EC2 ASG (Compute Stack) -->
  <g transform="translate(640, 330)">
    <rect x="0" y="0" width="280" height="110" class="card" />
    <rect x="20" y="35" width="40" height="40" fill="#F68536" class="icon-box" />
    <text x="40" y="62" fill="white" font-size="20" font-weight="bold" text-anchor="middle">AS</text>
    <text x="75" y="45" class="card-title">Auto Scaling Group</text>
    <text x="75" y="65" class="card-desc">Min/Max parameterized</text>
    <text x="75" y="85" class="card-desc">EC2 Instances (Launch Template)</text>
  </g>
  
  <!-- RDS (Database Stack) -->
  <g transform="translate(640, 470)">
    <rect x="0" y="0" width="280" height="90" class="card pulse-blue" />
    <rect x="20" y="25" width="40" height="40" fill="#3B82F6" class="icon-box" />
    <text x="40" y="52" fill="white" font-size="20" font-weight="bold" text-anchor="middle">DB</text>
    <text x="75" y="45" class="card-title">Amazon RDS</text>
    <text x="75" y="65" class="card-desc">Private Subnets / DB Group</text>
  </g>

  <!-- Lines -->
  <!-- User to CloudFormation -->
  <path d="M 240 325 L 290 325" class="line" marker-end="url(#arrowhead)" />
  <text x="245" y="315" class="label">YAML</text>
  
  <!-- CloudFormation to VPC (Network Stack) -->
  <path d="M 540 260 L 590 260 L 590 160 L 610 160" class="line" marker-end="url(#arrowhead)" />
  <text x="545" y="250" class="label">Provisions</text>

  <!-- CloudFormation to ALB -->
  <path d="M 540 290 L 630 290" class="line" marker-end="url(#arrowhead)" />

  <!-- CloudFormation to ASG -->
  <path d="M 540 320 L 590 320 L 590 380 L 630 380" class="line" marker-end="url(#arrowhead)" />

  <!-- CloudFormation to RDS -->
  <path d="M 540 350 L 570 350 L 570 515 L 630 515" class="line" marker-end="url(#arrowhead)" />
  
</svg>