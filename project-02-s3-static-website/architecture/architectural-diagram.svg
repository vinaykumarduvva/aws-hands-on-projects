<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Component Gradients -->
    <linearGradient id="cfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C4FFF"/>
      <stop offset="100%" stop-color="#6B2ED5"/>
    </linearGradient>

    <linearGradient id="s3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#EA580C" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#4B5563" />
    </marker>
  </defs>

  <style>
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .flow-line {
      stroke-dasharray: 6 6;
      animation: dash 1.5s linear infinite;
    }
    .flow-line:hover {
      stroke-width: 4px;
      cursor: pointer;
      filter: url(#glow);
    }
    .node {
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
    }
    .node:hover {
      transform: translateY(-5px);
    }
    .node:hover .card {
      filter: url(#hoverShadow);
    }
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    .floating-delay {
      animation: float 6s ease-in-out infinite;
      animation-delay: 3s;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="50" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 2 — Static Website on S3 + CloudFront</text>

  <!-- AWS Cloud Boundary -->
  <rect x="250" y="90" width="750" height="580" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="270" y="75" width="130" height="30" fill="#F8FAFC"/>
  <text x="280" y="97" font-size="20" font-weight="700" fill="#F58536">AWS Cloud</text>

  <!-- Regional Origin Zone (us-east-1) -->
  <rect x="620" y="140" width="340" height="480" rx="16" fill="#F0F8FF" stroke="#0073BB" stroke-width="2"/>
  <rect x="640" y="125" width="150" height="30" fill="#F8FAFC"/>
  <text x="650" y="147" font-size="16" font-weight="700" fill="#0073BB">Region: us-east-1</text>

  <!-- Flow Lines -->
  
  <!-- User to CloudFront -->
  <path d="M 180 320 L 335 320" fill="none" stroke="#6B7280" stroke-width="3" marker-end="url(#arrow-gray)" class="flow-line"/>
  <rect x="200" y="295" width="120" height="20" rx="10" fill="#F3F4F6"/>
  <text x="260" y="309" font-size="11" font-weight="700" fill="#4B5563" text-anchor="middle">HTTPS / Public Web</text>

  <!-- CloudFront to S3 -->
  <path d="M 520 320 L 665 320" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>
  <rect x="530" y="295" width="120" height="20" rx="10" fill="#ECFEFF"/>
  <text x="590" y="309" font-size="11" font-weight="700" fill="#0073BB" text-anchor="middle">Origin Request</text>

  <!-- Developer to S3 -->
  <path d="M 790 530 L 790 415" fill="none" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow-orange)" class="flow-line"/>
  <rect x="730" y="460" width="120" height="20" rx="10" fill="#FFEDD5"/>
  <text x="790" y="474" font-size="11" font-weight="700" fill="#EA580C" text-anchor="middle">AWS CLI Sync</text>

  <!-- Nodes -->

  <!-- End User -->
  <g class="node">
    <circle class="card" cx="110" cy="320" r="50" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="325" font-size="18" text-anchor="middle" class="title">Users</text>
    <text x="110" y="345" font-size="12" text-anchor="middle" class="label">Global</text>
  </g>

  <!-- CloudFront -->
  <g class="node floating">
    <rect class="card" x="350" y="250" width="170" height="140" rx="16" fill="url(#cfGrad)" filter="url(#shadow)"/>
    <circle cx="435" cy="290" r="20" fill="#ffffff" fill-opacity="0.2"/>
    <path d="M 425 290 L 435 280 L 445 290 L 435 300 Z" fill="#ffffff"/>
    <text x="435" y="340" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">CloudFront</text>
    <text x="435" y="360" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle" fill-opacity="0.9">CDN Edge Network</text>
  </g>

  <!-- S3 Bucket -->
  <g class="node floating-delay">
    <rect class="card" x="680" y="200" width="220" height="200" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="680" y="200" width="220" height="40" rx="12" fill="#FFF7ED"/>
    <rect x="680" y="220" width="220" height="20" fill="#FFF7ED"/>
    <text x="695" y="225" font-size="14" font-weight="700" fill="#C2410C">Amazon S3</text>
    
    <circle cx="875" cy="220" r="14" fill="#FFEDD5"/>
    <path d="M 870 216 h 10 v 8 h -10 z" fill="#C2410C"/>

    <text x="695" y="270" font-size="18" class="title">Website Bucket</text>
    <text x="695" y="295" font-size="13" class="label">Website Hosting: Enabled</text>
    <text x="695" y="315" font-size="13" class="label">Index Doc: index.html</text>
    
    <rect x="695" y="335" width="180" height="50" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
    <text x="705" y="355" font-size="12" font-weight="600" fill="#166534">Bucket Policy</text>
    <text x="705" y="370" font-size="11" font-weight="500" fill="#15803D">PublicReadGetObject (Allow)</text>
  </g>

  <!-- Developer -->
  <g class="node">
    <rect class="card" x="690" y="540" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="690" y="540" width="200" height="30" rx="12" fill="#F3F4F6"/>
    <rect x="690" y="555" width="200" height="15" fill="#F3F4F6"/>
    
    <text x="790" y="560" font-size="13" font-weight="700" fill="#4B5563" text-anchor="middle">Developer Workstation</text>
    
    <text x="790" y="595" font-size="15" class="title" text-anchor="middle">CI/CD or Local</text>
    <text x="790" y="615" font-size="12" class="label" text-anchor="middle">s3 sync index.html</text>
  </g>

</svg>
