<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&amp;display=swap');
      
      :root {
        --bg-color: #f8fafc;
        --text-color: #1e293b;
        --card-bg: #ffffff;
        --card-border: #e2e8f0;
        --s3-color: #569A31;
        --sqs-color: #FF4F8B;
        --lambda-color: #D18B00;
        --line-color: #94a3b8;
      }
      
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0f172a;
          --text-color: #f1f5f9;
          --card-bg: #1e293b;
          --card-border: #334155;
          --s3-color: #569A31;
          --sqs-color: #FF4F8B;
          --lambda-color: #F69905;
          --line-color: #475569;
        }
      }
      
      text {
        font-family: 'Outfit', system-ui, sans-serif;
        fill: var(--text-color);
      }
      
      .bg { fill: var(--bg-color); }
      .card { fill: var(--card-bg); stroke: var(--card-border); stroke-width: 2px; rx: 12px; }
      .icon-box { rx: 8px; }
      
      .title { font-size: 28px; font-weight: 600; }
      .subtitle { font-size: 16px; font-weight: 300; opacity: 0.8; }
      .card-title { font-size: 18px; font-weight: 600; }
      .card-desc { font-size: 14px; opacity: 0.8; }
      
      .line {
        stroke: var(--line-color);
        stroke-width: 2px;
        fill: none;
        stroke-dasharray: 6;
        animation: dash 20s linear infinite;
      }
      
      .arrow { fill: var(--line-color); }
      
      @keyframes dash {
        to { stroke-dashoffset: -400; }
      }
      
      @keyframes pulse {
        0% { filter: drop-shadow(0 0 4px rgba(255, 79, 139, 0.2)); }
        50% { filter: drop-shadow(0 0 12px rgba(255, 79, 139, 0.6)); }
        100% { filter: drop-shadow(0 0 4px rgba(255, 79, 139, 0.2)); }
      }
      
      .pulse-obj { animation: pulse 3s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1000" height="600" />

  <!-- Header -->
  <text x="50" y="60" class="title">Event-Driven Pipeline Architecture</text>
  <text x="50" y="85" class="subtitle">Amazon S3 → Amazon SQS → AWS Lambda</text>

  <!-- Developer / App -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="180" height="120" class="card" />
    <text x="90" y="35" class="card-title" text-anchor="middle">User / App</text>
    <text x="90" y="65" class="card-desc" text-anchor="middle">Uploads .csv or .json</text>
    <text x="90" y="85" class="card-desc" text-anchor="middle">files to Source Bucket</text>
  </g>

  <!-- Source S3 Bucket -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="220" height="120" class="card" />
    <rect x="20" y="20" width="40" height="40" fill="#569A31" class="icon-box" />
    <text x="40" y="47" fill="white" font-size="20" font-weight="bold" text-anchor="middle">S3</text>
    <text x="75" y="45" class="card-title">Source Bucket</text>
    <text x="20" y="85" class="card-desc">event-pipeline-source</text>
    <text x="20" y="105" class="card-desc">Event Notification (ObjectCreated:*)</text>
  </g>

  <!-- SQS Queue -->
  <g transform="translate(300, 320)">
    <rect x="0" y="0" width="220" height="120" class="card pulse-obj" />
    <rect x="20" y="20" width="40" height="40" fill="#FF4F8B" class="icon-box" />
    <text x="40" y="47" fill="white" font-size="20" font-weight="bold" text-anchor="middle">SQS</text>
    <text x="75" y="45" class="card-title">Message Queue</text>
    <text x="20" y="85" class="card-desc">file-processing-queue</text>
    <text x="20" y="105" class="card-desc">Visibility Timeout: 60s</text>
  </g>
  
  <!-- DLQ -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="180" height="90" class="card" stroke-dasharray="4" />
    <text x="90" y="35" class="card-title" text-anchor="middle" fill="#FF4F8B">Dead Letter Queue</text>
    <text x="90" y="60" class="card-desc" text-anchor="middle">Max Retries: 3</text>
  </g>

  <!-- Lambda Function -->
  <g transform="translate(600, 320)">
    <rect x="0" y="0" width="240" height="120" class="card" />
    <rect x="20" y="20" width="40" height="40" fill="#F69905" class="icon-box" />
    <text x="40" y="47" fill="white" font-size="20" font-weight="bold" text-anchor="middle">λ</text>
    <text x="75" y="45" class="card-title">Lambda Processor</text>
    <text x="20" y="80" class="card-desc">1. Polls queue (Event Mapped)</text>
    <text x="20" y="98" class="card-desc">2. Downloads file from S3</text>
    <text x="20" y="116" class="card-desc">3. Computes &amp; Outputs Result</text>
  </g>

  <!-- Output S3 Bucket -->
  <g transform="translate(600, 150)">
    <rect x="0" y="0" width="240" height="120" class="card" />
    <rect x="20" y="20" width="40" height="40" fill="#569A31" class="icon-box" />
    <text x="40" y="47" fill="white" font-size="20" font-weight="bold" text-anchor="middle">S3</text>
    <text x="75" y="45" class="card-title">Output Bucket</text>
    <text x="20" y="85" class="card-desc">event-pipeline-output</text>
    <text x="20" y="105" class="card-desc">Stores JSON computation results</text>
  </g>

  <!-- Connecting Lines and Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <!-- App to Source Bucket -->
  <path d="M 230 210 L 290 210" class="line" marker-end="url(#arrowhead)" />
  
  <!-- Source Bucket to SQS -->
  <path d="M 410 270 L 410 310" class="line" marker-end="url(#arrowhead)" />
  
  <!-- SQS to DLQ -->
  <path d="M 300 380 L 240 380" class="line" marker-end="url(#arrowhead)" />
  <text x="270" y="370" class="card-desc" text-anchor="middle">Fail</text>
  
  <!-- SQS to Lambda -->
  <path d="M 520 380 L 590 380" class="line" marker-end="url(#arrowhead)" />
  
  <!-- Lambda to S3 Source (Download) -->
  <path d="M 720 320 C 720 280, 520 280, 520 210" class="line" marker-end="url(#arrowhead)" stroke-dasharray="2" />
  <text x="620" y="270" class="card-desc">Download File</text>

  <!-- Lambda to Output Bucket -->
  <path d="M 720 320 L 720 280" class="line" marker-end="url(#arrowhead)" />
  <text x="730" y="305" class="card-desc">Write JSON</text>
</svg>
