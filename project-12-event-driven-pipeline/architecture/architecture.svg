<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Colors -->
    <linearGradient id="s3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="sqsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4F8B"/>
      <stop offset="100%" stop-color="#D93068"/>
    </linearGradient>
    <linearGradient id="lambdaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F58536"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feFlood flood-color="#FF4F8B" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#10B981" />
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#FF4F8B" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#F58536" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -20; } }
    .flow-line { stroke-dasharray: 6 6; animation: dash 1.5s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 4px rgba(255, 79, 139, 0.4)); stroke-width: 1.5px; }
      50% { filter: drop-shadow(0 0 16px rgba(255, 79, 139, 0.8)); stroke-width: 2.5px; }
      100% { filter: drop-shadow(0 0 4px rgba(255, 79, 139, 0.4)); stroke-width: 1.5px; }
    }
    .pulse-obj .card { animation: pulse 2.5s infinite; }
    
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 12 — Event-Driven Pipeline Architecture</text>
  <text x="550" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">Amazon S3 → Amazon SQS → AWS Lambda</text>


  <!-- Developer / App -->
  <g class="node">
    <rect class="card" x="60" y="240" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="60" y="240" width="200" height="30" rx="12" fill="#F3F4F6"/>
    <rect x="60" y="255" width="200" height="15" fill="#F3F4F6"/>
    <text x="160" y="260" font-size="13" font-weight="700" fill="#374151" text-anchor="middle">User / App</text>
    <text x="160" y="295" font-size="12" class="title" text-anchor="middle">Uploads .csv or .json</text>
    <text x="160" y="315" font-size="11" class="label" text-anchor="middle">to Source Bucket</text>
  </g>

  <!-- Flow to S3 -->
  <path d="M 270 290 L 370 290" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>

  <!-- Source S3 Bucket -->
  <g class="node floating">
    <rect class="card" x="380" y="230" width="240" height="120" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="380" y="230" width="240" height="40" rx="12" fill="url(#s3Grad)"/>
    <text x="500" y="255" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">S3 Source Bucket</text>
    
    <text x="500" y="300" font-size="13" class="title" text-anchor="middle">event-pipeline-source</text>
    <text x="500" y="325" font-size="11" class="label" text-anchor="middle">Event Notification (ObjectCreated:*)</text>
  </g>


  <!-- Flow to SQS -->
  <path d="M 500 360 L 500 460" fill="none" stroke="#FF4F8B" stroke-width="3" marker-end="url(#arrow-pink)" class="flow-line"/>
  <rect x="420" y="390" width="160" height="20" rx="10" fill="#FCE7F3"/>
  <text x="500" y="404" font-size="11" font-weight="700" fill="#DB2777" text-anchor="middle">Triggers Message</text>

  <!-- SQS Queue -->
  <g class="node floating-delay">
    <rect class="card" x="380" y="470" width="240" height="120" rx="12" fill="#FFFFFF" stroke="#FF4F8B" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="380" y="470" width="240" height="40" rx="12" fill="url(#sqsGrad)"/>
    <text x="500" y="495" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">SQS Message Queue</text>
    
    <text x="500" y="540" font-size="13" class="title" text-anchor="middle">file-processing-queue</text>
    <text x="500" y="565" font-size="11" class="label" text-anchor="middle">Visibility Timeout: 60s</text>
  </g>


  <!-- DLQ -->
  <g class="node pulse-obj">
    <rect class="card" x="80" y="485" width="180" height="90" rx="12" fill="#FFFFFF" stroke="#FF4F8B" stroke-dasharray="4,4" filter="url(#redGlow)"/>
    <rect x="80" y="485" width="180" height="30" rx="12" fill="#FF4F8B"/>
    <rect x="80" y="500" width="180" height="15" fill="#FF4F8B"/>
    <text x="170" y="505" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Dead Letter Queue</text>
    
    <text x="170" y="540" font-size="12" class="title" text-anchor="middle">Failed Messages</text>
    <text x="170" y="560" font-size="11" class="label" text-anchor="middle">Max Retries: 3</text>
  </g>

  <path d="M 370 530 L 270 530" fill="none" stroke="#FF4F8B" stroke-width="3" marker-end="url(#arrow-pink)" class="flow-line"/>


  <!-- SQS to Lambda -->
  <path d="M 630 530 L 730 530" fill="none" stroke="#F58536" stroke-width="3" marker-end="url(#arrow-orange)" class="flow-line"/>
  <rect x="640" y="500" width="80" height="20" rx="10" fill="#FFEDD5"/>
  <text x="680" y="514" font-size="11" font-weight="700" fill="#C2410C" text-anchor="middle">Polls</text>


  <!-- Lambda Processor -->
  <g class="node floating">
    <rect class="card" x="740" y="470" width="260" height="130" rx="12" fill="#FFFFFF" stroke="#F58536" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="740" y="470" width="260" height="40" rx="12" fill="url(#lambdaGrad)"/>
    <text x="870" y="495" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">AWS Lambda</text>
    
    <text x="870" y="535" font-size="13" class="title" text-anchor="middle">Processor Function</text>
    <text x="870" y="555" font-size="11" class="label" text-anchor="middle">Downloads file from S3 Source</text>
    <text x="870" y="575" font-size="11" class="label" text-anchor="middle">Computes &amp; Outputs Result</text>
  </g>

  <!-- Lambda to S3 Source (Download) -->
  <path d="M 870 460 C 870 300, 630 300, 630 290" fill="none" stroke="#F58536" stroke-width="2" stroke-dasharray="8,8" marker-end="url(#arrow-orange)"/>
  <rect x="690" y="320" width="120" height="20" rx="10" fill="#FFEDD5"/>
  <text x="750" y="334" font-size="10" font-weight="700" fill="#C2410C" text-anchor="middle">Download Source</text>

  <!-- Output Bucket -->
  <g class="node floating-delay">
    <rect class="card" x="750" y="140" width="240" height="120" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="750" y="140" width="240" height="40" rx="12" fill="url(#s3Grad)"/>
    <text x="870" y="165" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">S3 Output Bucket</text>
    
    <text x="870" y="210" font-size="13" class="title" text-anchor="middle">event-pipeline-output</text>
    <text x="870" y="235" font-size="11" class="label" text-anchor="middle">Stores JSON computation results</text>
  </g>

  <!-- Lambda to S3 Output -->
  <path d="M 870 460 L 870 270" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrow-green)" class="flow-line"/>
  <rect x="800" y="380" width="140" height="20" rx="10" fill="#D1FAE5"/>
  <text x="870" y="394" font-size="11" font-weight="700" fill="#047857" text-anchor="middle">Write JSON Result</text>

</svg>
