<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Cloud Resource Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        aws: {
                            orange: '#FF9900',
                            squid: '#232F3E',
                            blue: '#007EBC',
                        },
                        cloud: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    },
                    animation: {
                        'float': 'float 4s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.6', filter: 'drop-shadow(0 0 10px rgba(255, 153, 0, 0.4))' },
                            '50%': { opacity: '1', filter: 'drop-shadow(0 0 25px rgba(255, 153, 0, 0.8))' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-radial-grid {
            background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>

    <!-- SEO & Open Graph Tags -->
    <meta property="og:title" content="404 - AWS CloudShell">
    <meta property="og:description" content="Page not found.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://aws-handy-book.s3.amazonaws.com/images/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
</head>
<body class="antialiased min-h-screen bg-cloud-900 text-slate-50 flex items-center justify-center overflow-hidden relative">

    <!-- Background Grid -->
    <div class="absolute inset-0 z-0 opacity-10 pointer-events-none bg-radial-grid"></div>

    <main class="relative z-10 text-center px-4 max-w-2xl mx-auto flex flex-col items-center group">
        <!-- Floating Cloud Icon -->
        <div class="animate-float mb-8 relative">
            <div class="absolute inset-0 bg-aws-orange blur-3xl opacity-20 rounded-full"></div>
            <i class="fas fa-cloud text-9xl text-slate-200 animate-pulse-glow group-hover:text-aws-orange transition-colors duration-500"></i>
            <i class="fas fa-bolt absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-4xl text-sky-400 mt-2"></i>
        </div>

        <h1 class="text-7xl font-bold font-mono tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-aws-orange to-sky-400 mb-4">404</h1>
        <h2 class="text-2xl sm:text-3xl font-semibold mb-6 text-slate-200">Cloud Resource Disconnected</h2>
        <p class="text-slate-400 mb-10 text-lg">
            The endpoint you are trying to reach has drifted into the void. It might have been terminated, or perhaps it never existed in this VPC.
        </p>
        <div class="flex gap-4 flex-col sm:flex-row justify-center">
            <a href="index.html" class="px-8 py-3 bg-aws-orange hover:bg-orange-500 text-white font-bold rounded shadow-[0_0_15px_rgba(255,153,0,0.4)] hover:shadow-[0_0_25px_rgba(255,153,0,0.6)] transition-all flex items-center gap-2 transform hover:-translate-y-1">
                <i class="fas fa-terminal"></i> Return to CloudShell
            </a>
            <a href="../AWS_Handy_Book/website/index.html" class="px-8 py-3 bg-cloud-800 hover:bg-cloud-700 border border-cloud-700 text-white font-medium rounded transition-all flex items-center gap-2 transform hover:-translate-y-1">
                <i class="fas fa-book"></i> Access AWS Handy Book
            </a>
        </div>
    </main>

</body>
</html>
