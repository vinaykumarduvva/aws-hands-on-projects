<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0073BB" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#8C4FFF" />
    </marker>
  </defs>

  <style>
    @keyframes dash { to { stroke-dashoffset: -20; } }
    .flow-line { stroke-dasharray: 6 6; animation: dash 1.5s linear infinite; }
    .flow-line:hover { stroke-width: 4px; cursor: pointer; filter: url(#glow); }
    .node { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .node:hover { transform: translateY(-5px); }
    .node:hover .card { filter: url(#hoverShadow); }
    .floating { animation: float 6s ease-in-out infinite; }
    .floating-delay { animation: float 6s ease-in-out infinite; animation-delay: 3s; }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    text { font-family: 'Inter', -apple-system, sans-serif; }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="40" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">Project 6 — Two-Tier Architecture: EC2 + RDS MySQL</text>
  <text x="550" y="65" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">VPC: 10.0.0.0/16 · Region: us-east-1 · MySQL 8.0</text>

  <!-- AWS Cloud Boundary -->
  <rect x="50" y="200" width="800" height="550" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="70" y="185" width="220" height="30" fill="#F8FAFC"/>
  <text x="80" y="207" font-size="20" font-weight="700" fill="#F58536">AWS Cloud (VPC)</text>

  <!-- Public Subnet -->
  <rect x="80" y="240" width="740" height="180" rx="16" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <rect x="100" y="225" width="340" height="30" fill="#F8FAFC"/>
  <text x="110" y="247" font-size="16" font-weight="700" fill="#16A34A">Public Subnet A — 10.0.1.0/24 (us-east-1a)</text>

  <!-- Private Subnet (DB Tier) -->
  <rect x="80" y="460" width="740" height="260" rx="16" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <rect x="100" y="445" width="240" height="30" fill="#F8FAFC"/>
  <text x="110" y="467" font-size="16" font-weight="700" fill="#DC2626">Private Subnets (DB Tier)</text>

  <!-- Nodes (Outside VPC) -->
  <g class="node">
    <rect class="card" x="180" y="80" width="200" height="50" rx="25" fill="#FFFFFF" stroke="#0073BB" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="205" cy="105" r="14" fill="#E0F2FE"/>
    <text x="290" y="111" font-size="18" font-weight="700" fill="#0073BB" text-anchor="middle">Internet</text>
  </g>

  <!-- Internet to IGW -->
  <path d="M 280 130 L 280 160" fill="none" stroke="#0073BB" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>

  <!-- IGW -->
  <g class="node floating">
    <rect class="card" x="180" y="140" width="200" height="40" rx="12" fill="#FFFFFF" stroke="#F58536" stroke-width="2" filter="url(#shadow)"/>
    <text x="280" y="166" font-size="16" font-weight="700" fill="#C2410C" text-anchor="middle">Internet Gateway</text>
  </g>

  <path d="M 280 180 L 280 270" fill="none" stroke="#F58536" stroke-width="3" marker-end="url(#arrow-blue)" class="flow-line"/>

  <!-- EC2 App Server -->
  <g class="node floating">
    <rect class="card" x="120" y="270" width="660" height="120" rx="12" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="120" y="270" width="660" height="36" rx="12" fill="#F0FDF4"/>
    <rect x="120" y="286" width="660" height="20" fill="#F0FDF4"/>
    <text x="450" y="294" font-size="14" font-weight="700" fill="#15803D" text-anchor="middle">EC2 App Server</text>
    
    <text x="450" y="330" font-size="16" class="title" text-anchor="middle">Amazon Linux 2023 · t2.micro</text>
    <text x="450" y="350" font-size="13" class="label" text-anchor="middle">MySQL Client + Apache installed via User Data · Public IP ✅</text>
    
    <rect x="140" y="315" width="220" height="60" rx="8" fill="#F3F4F6"/>
    <text x="250" y="340" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Security Group: ec2-app-sg</text>
    <text x="250" y="360" font-size="11" fill="#4B5563" text-anchor="middle">SSH :22 (My IP) · HTTP :80 (Any)</text>
  </g>

  <!-- Flow App Server to RDS -->
  <path d="M 450 390 L 450 490" fill="none" stroke="#8C4FFF" stroke-width="3" marker-end="url(#arrow-purple)" class="flow-line"/>
  <rect x="370" y="430" width="160" height="20" rx="10" fill="#F3E8FF"/>
  <text x="450" y="444" font-size="11" font-weight="700" fill="#6D28D9" text-anchor="middle">MySQL Port 3306</text>


  <!-- RDS Database -->
  <g class="node floating-delay">
    <rect class="card" x="120" y="490" width="660" height="200" rx="12" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="120" y="490" width="660" height="40" rx="12" fill="#FEF2F2"/>
    <rect x="120" y="510" width="660" height="20" fill="#FEF2F2"/>
    <text x="450" y="515" font-size="16" font-weight="700" fill="#B91C1C" text-anchor="middle">RDS MySQL 8.0 — myapp-database</text>
    
    <text x="450" y="560" font-size="18" class="title" text-anchor="middle">db.t3.micro · 20 GB gp2</text>
    <text x="450" y="585" font-size="13" class="label" text-anchor="middle">Subnet Group: rds-subnet-group (spans both AZs)</text>
    <text x="450" y="605" font-size="13" class="label" text-anchor="middle">Endpoint: myapp-database.xxxx.us-east-1.rds.amazonaws.com</text>
    <text x="450" y="625" font-size="13" class="label" text-anchor="middle">DB: appdb · Tables: users, products, orders</text>
    
    <rect x="140" y="540" width="220" height="60" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
    <text x="250" y="565" font-size="12" font-weight="700" fill="#B91C1C" text-anchor="middle">Security Group: rds-sg</text>
    <text x="250" y="585" font-size="11" fill="#DC2626" text-anchor="middle">Port 3306 (From App SG only)</text>
  </g>


  <!-- AWS Managed Services Area -->
  <rect x="880" y="240" width="180" height="480" rx="16" fill="#F8FAFC" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="890" y="225" width="160" height="30" fill="#F8FAFC"/>
  <text x="970" y="247" font-size="16" font-weight="700" fill="#6B7280" text-anchor="middle">Managed Services</text>

  <!-- Secrets Manager -->
  <g class="node">
    <rect class="card" x="900" y="280" width="140" height="180" rx="12" fill="#FFFFFF" stroke="#8C4FFF" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="900" y="280" width="140" height="36" rx="12" fill="#F5F3FF"/>
    <rect x="900" y="296" width="140" height="20" fill="#F5F3FF"/>
    <text x="970" y="304" font-size="13" font-weight="700" fill="#6D28D9" text-anchor="middle">Secrets Manager</text>
    
    <text x="970" y="335" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">rds/myapp/creds</text>
    <text x="970" y="355" font-size="11" fill="#4B5563" text-anchor="middle">user: admin</text>
    <text x="970" y="370" font-size="11" fill="#4B5563" text-anchor="middle">pass: ••••••••</text>
    <text x="970" y="385" font-size="11" fill="#4B5563" text-anchor="middle">port: 3306</text>
    <text x="970" y="405" font-size="10" font-weight="600" fill="#6D28D9" text-anchor="middle">IAM: GetSecretValue</text>
    <text x="970" y="420" font-size="10" fill="#6D28D9" text-anchor="middle">via ec2-app-role</text>
  </g>

  <!-- CloudWatch -->
  <g class="node">
    <rect class="card" x="900" y="490" width="140" height="190" rx="12" fill="#FFFFFF" stroke="#F58536" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="900" y="490" width="140" height="36" rx="12" fill="#FFF7ED"/>
    <rect x="900" y="506" width="140" height="20" fill="#FFF7ED"/>
    <text x="970" y="514" font-size="13" font-weight="700" fill="#C2410C" text-anchor="middle">CloudWatch</text>
    
    <text x="970" y="545" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">RDS Metrics</text>
    <text x="970" y="565" font-size="11" fill="#4B5563" text-anchor="middle">CPUUtilization</text>
    <text x="970" y="580" font-size="11" fill="#4B5563" text-anchor="middle">DB Connections</text>
    <text x="970" y="595" font-size="11" fill="#4B5563" text-anchor="middle">FreeStorageSpace</text>
    <text x="970" y="610" font-size="11" fill="#4B5563" text-anchor="middle">Read/Write IOPS</text>
    <text x="970" y="635" font-size="10" font-weight="600" fill="#C2410C" text-anchor="middle">Auto-collected</text>
  </g>

  <!-- App Server to Secrets Manager -->
  <path d="M 780 340 L 890 340" fill="none" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-purple)"/>

  <!-- RDS to CloudWatch -->
  <path d="M 780 580 L 890 580" fill="none" stroke="#F58536" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-orange)"/>
</svg>