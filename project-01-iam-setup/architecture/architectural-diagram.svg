<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="hoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#0891B2" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#E11D48" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#EA580C" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,2 L0,8 L8,5 z" fill="#4B5563" />
    </marker>
  </defs>

  <style>
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .flow-line {
      stroke-dasharray: 6 6;
      animation: dash 1.5s linear infinite;
    }
    .flow-line:hover {
      stroke-width: 4px;
      cursor: pointer;
      filter: url(#glow);
    }
    
    .node {
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
    }
    .node:hover {
      transform: translateY(-5px);
    }
    .node:hover .card {
      filter: url(#hoverShadow);
    }
    
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    .floating-delay {
      animation: float 6s ease-in-out infinite;
      animation-delay: 3s;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    /* Typography */
    text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .title { font-weight: 700; fill: #111827; }
    .label { font-weight: 500; fill: #6B7280; font-size: 13px; }
  </style>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <text x="550" y="50" font-size="28" font-weight="800" fill="#111827" text-anchor="middle">AWS Account Setup &amp; IAM Foundations</text>

  <!-- AWS Account Boundary -->
  <rect x="100" y="90" width="670" height="480" rx="20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="120" y="75" width="220" height="30" fill="#F8FAFC"/>
  <text x="130" y="97" font-size="20" font-weight="700" fill="#F58536">AWS Account</text>
  <text x="270" y="96" font-size="14" font-weight="500" fill="#6B7280">(12-Digit ID)</text>

  <!-- Connections (Lines drawn first so they are under nodes) -->
  
  <!-- Root -> IAM -->
  <path d="M 390 220 L 465 220" fill="none" stroke="#0891B2" stroke-width="3" marker-end="url(#arrow-cyan)" class="flow-line"/>
  <rect x="395" y="210" width="65" height="20" rx="10" fill="#ECFEFF"/>
  <text x="427" y="224" font-size="11" font-weight="700" fill="#0891B2" text-anchor="middle">Provisions</text>

  <!-- Root -> CloudWatch -->
  <path d="M 270 280 L 270 385" fill="none" stroke="#E11D48" stroke-width="3" marker-end="url(#arrow-red)" class="flow-line"/>
  <rect x="235" y="325" width="70" height="20" rx="10" fill="#FFF1F2"/>
  <text x="270" y="339" font-size="11" font-weight="700" fill="#E11D48" text-anchor="middle">Configures</text>

  <!-- CloudWatch -> SNS -->
  <path d="M 390 460 L 465 460" fill="none" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow-orange)" class="flow-line"/>
  <rect x="395" y="450" width="65" height="20" rx="10" fill="#FFEDD5"/>
  <text x="427" y="464" font-size="11" font-weight="700" fill="#EA580C" text-anchor="middle">Triggers</text>

  <!-- SNS -> Email -->
  <path d="M 720 460 L 835 460" fill="none" stroke="#4B5563" stroke-width="3" marker-end="url(#arrow-gray)" class="flow-line"/>
  <rect x="745" y="450" width="65" height="20" rx="10" fill="#F3F4F6"/>
  <text x="777" y="464" font-size="11" font-weight="700" fill="#4B5563" text-anchor="middle">Delivers</text>

  <!-- Nodes -->

  <!-- Root User -->
  <g class="node floating">
    <rect class="card" x="150" y="160" width="240" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="150" y="160" width="240" height="36" rx="12" fill="#FEF2F2"/>
    <rect x="150" y="176" width="240" height="20" fill="#FEF2F2"/>
    <text x="165" y="184" font-size="14" font-weight="700" fill="#DC2626">Root Identity</text>
    
    <text x="165" y="225" font-size="18" class="title">AWS Root User</text>
    <text x="165" y="250" font-size="13" class="label">MFA Enabled for Security</text>
    
    <!-- MFA Lock Icon -->
    <circle cx="350" cy="235" r="16" fill="#D1FAE5"/>
    <path d="M 350 231 c -2 0 -4 1 -4 3 v 2 h -2 v 7 h 12 v -7 h -2 v -2 c 0 -2 -2 -3 -4 -3 z" fill="#10B981"/>
    <circle cx="350" cy="241" r="1.5" fill="#FFFFFF"/>
  </g>

  <!-- IAM Admin User -->
  <g class="node floating-delay">
    <rect class="card" x="480" y="160" width="240" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="480" y="160" width="240" height="36" rx="12" fill="#ECFEFF"/>
    <rect x="480" y="176" width="240" height="20" fill="#ECFEFF"/>
    <text x="495" y="184" font-size="14" font-weight="700" fill="#0891B2">IAM User</text>
    
    <text x="495" y="225" font-size="18" class="title">IAM Admin User</text>
    <text x="495" y="250" font-size="13" class="label">AdministratorAccess &amp; CLI</text>
    
    <!-- CLI Terminal Icon -->
    <circle cx="680" cy="235" r="16" fill="#CFFAFE"/>
    <path d="M 674 231 l 4 4 l -4 4 m 6 0 h 5" fill="none" stroke="#0891B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CloudWatch Billing Alarm -->
  <g class="node floating-delay">
    <rect class="card" x="150" y="400" width="240" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="150" y="400" width="240" height="36" rx="12" fill="#FFF1F2"/>
    <rect x="150" y="416" width="240" height="20" fill="#FFF1F2"/>
    <text x="165" y="424" font-size="14" font-weight="700" fill="#E11D48">CloudWatch</text>
    
    <text x="165" y="465" font-size="18" class="title">Billing Alarm</text>
    <text x="165" y="490" font-size="13" class="label">Estimated Charges > $5.00</text>
    
    <!-- Bell Icon -->
    <circle cx="350" cy="475" r="16" fill="#FFE4E6"/>
    <path d="M 350 468 c -3 0 -5 2 -5 4 v 4 h 10 v -4 c 0 -2 -2 -4 -5 -4 z m -2 9 a 2 2 0 0 0 4 0" fill="#E11D48"/>
  </g>

  <!-- SNS Topic -->
  <g class="node floating">
    <rect class="card" x="480" y="400" width="240" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="480" y="400" width="240" height="36" rx="12" fill="#FFEDD5"/>
    <rect x="480" y="416" width="240" height="20" fill="#FFEDD5"/>
    <text x="495" y="424" font-size="14" font-weight="700" fill="#EA580C">Amazon SNS</text>
    
    <text x="495" y="465" font-size="18" class="title">Billing Alerts Topic</text>
    <text x="495" y="490" font-size="13" class="label">Pub/Sub Notification</text>
    
    <!-- SNS Hub Icon -->
    <circle cx="680" cy="475" r="16" fill="#FFEDD5"/>
    <circle cx="680" cy="475" r="4" fill="#EA580C"/>
    <line x1="680" y1="475" x2="674" y2="483" stroke="#EA580C" stroke-width="2"/>
    <circle cx="672" cy="485" r="3" fill="#EA580C"/>
    <line x1="680" y1="475" x2="686" y2="483" stroke="#EA580C" stroke-width="2"/>
    <circle cx="688" cy="485" r="3" fill="#EA580C"/>
  </g>

  <!-- Email Subscriber (External) -->
  <g class="node">
    <rect class="card" x="850" y="400" width="180" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="850" y="400" width="180" height="36" rx="12" fill="#F3F4F6"/>
    <rect x="850" y="416" width="180" height="20" fill="#F3F4F6"/>
    <text x="865" y="424" font-size="14" font-weight="700" fill="#4B5563">External</text>
    
    <text x="865" y="465" font-size="18" class="title">Email Inbox</text>
    <text x="865" y="490" font-size="13" class="label">Receives Alerts</text>
    
    <!-- Email Icon -->
    <circle cx="985" cy="475" r="16" fill="#E5E7EB"/>
    <rect x="977" y="470" width="16" height="12" rx="2" fill="none" stroke="#4B5563" stroke-width="1.5"/>
    <polyline points="977,470 985,476 993,470" fill="none" stroke="#4B5563" stroke-width="1.5"/>
  </g>

</svg>